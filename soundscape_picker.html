<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Choose Soundscape - Spatial Audio AR</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { 
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; 
            background: #1a1a2e; 
            color: #fff; 
            padding: 20px;
            min-height: 100vh;
        }
        .container {
            max-width: 600px;
            margin: 0 auto;
        }
        h1 {
            margin-bottom: 10px;
            color: #00d9ff;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .new-soundscape-link {
            font-size: 0.7em;
            color: #00ff88;
            text-decoration: none;
            cursor: pointer;
            padding: 4px 10px;
            border: 1px solid rgba(0, 255, 136, 0.5);
            border-radius: 4px;
            background: rgba(0, 255, 136, 0.1);
            transition: all 0.2s;
            font-weight: 500;
        }
        .new-soundscape-link:hover {
            background: rgba(0, 255, 136, 0.2);
            border-color: #00ff88;
            transform: translateY(-1px);
        }
        /* Hide "New Soundscape" button on mobile/phone devices */
        .new-soundscape-link.hidden {
            display: none;
        }
        .subtitle {
            color: #888; 
            margin-bottom: 20px;
            font-size: 0.9em;
        }
        .logout-btn {
            position: fixed;
            top: 20px;
            right: 20px;
            background: rgba(255,255,255,0.1);
            border: none;
            color: #fff;
            padding: 8px 12px;
            border-radius: 6px;
            cursor: pointer;
            font-size: 0.85em;
            transition: background 0.2s;
        }
        .logout-btn:hover {
            background: rgba(255,255,255,0.2);
        }
        #soundscapeList { 
            list-style: none; 
            margin-top: 20px;
        }
        .soundscape-item {
            background: rgba(255,255,255,0.1);
            border-radius: 8px;
            padding: 15px;
            margin: 10px 0;
            cursor: pointer;
            transition: all 0.2s;
            border: 1px solid transparent;
        }
        .soundscape-item:hover { 
            background: rgba(255,255,255,0.15);
            border-color: #00d9ff;
            transform: translateX(5px);
        }
        .soundscape-name { 
            font-size: 1.1em; 
            font-weight: 600;
            color: #00d9ff;
        }
        .soundscape-meta { 
            font-size: 0.85em; 
            color: #888; 
            margin-top: 8px;
            display: flex;
            justify-content: space-between;
        }
        .loading, .empty, .error { 
            text-align: center; 
            padding: 40px; 
            color: #888;
            font-size: 0.95em;
        }
        .empty {
            background: rgba(255,255,255,0.05);
            border-radius: 8px;
            margin-top: 20px;
        }
        .error {
            background: rgba(233, 69, 96, 0.1);
            border: 1px solid #e94560;
            border-radius: 8px;
            color: #e94560;
        }
        .back-btn {
            display: inline-block;
            margin-bottom: 20px;
            padding: 8px 16px;
            background: rgba(255,255,255,0.1);
            color: #fff;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            font-size: 0.9em;
            transition: background 0.2s;
        }
        .back-btn:hover {
            background: rgba(255,255,255,0.2);
        }
        .icon {
            margin-right: 8px;
        }

        /* Download button and progress */
        .soundscape-actions {
            margin-top: 10px;
            display: flex;
            align-items: center;
            gap: 10px;
            flex-wrap: wrap;
        }

        .download-btn {
            background: rgba(0, 217, 255, 0.2);
            border: 1px solid rgba(0, 217, 255, 0.5);
            color: #00d9ff;
            padding: 6px 12px;
            border-radius: 4px;
            cursor: pointer;
            font-size: 0.85em;
            transition: all 0.2s;
            display: inline-flex;
            align-items: center;
            gap: 5px;
        }

        .download-btn:hover {
            background: rgba(0, 217, 255, 0.3);
            border-color: #00d9ff;
        }

        .download-btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        .download-progress {
            flex: 1;
            min-width: 150px;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .progress-bar {
            flex: 1;
            height: 6px;
            background: rgba(255, 255, 255, 0.1);
            border-radius: 3px;
            overflow: hidden;
        }

        .progress-fill {
            height: 100%;
            background: linear-gradient(90deg, #00d9ff, #00ff88);
            transition: width 0.3s ease-out;
            width: 0%;
        }

        .progress-text {
            font-size: 0.75em;
            color: #00ff88;
            min-width: 40px;
            white-space: nowrap;
        }

        .offline-status {
            display: flex;
            align-items: center;
            gap: 8px;
            color: #00ff88;
            font-size: 0.85em;
            background: rgba(0, 255, 136, 0.1);
            padding: 4px 10px;
            border-radius: 4px;
            border: 1px solid rgba(0, 255, 136, 0.3);
        }

        .delete-offline-btn {
            background: none;
            border: none;
            color: #ff6b6b;
            cursor: pointer;
            font-size: 1em;
            opacity: 0.7;
            transition: opacity 0.2s;
            padding: 2px 6px;
        }

        .delete-offline-btn:hover {
            opacity: 1;
        }

        /* Offline mode notice banner */
        .offline-notice {
            background: rgba(255, 193, 7, 0.15);
            border: 1px solid rgba(255, 193, 7, 0.5);
            border-radius: 8px;
            padding: 15px;
            margin: 10px 0;
            color: #ffc107;
            font-size: 0.95em;
            text-align: center;
        }

        .offline-notice strong {
            color: #ffc107;
            font-size: 1.1em;
        }

        /* Responsive adjustments */
        @media (max-width: 480px) {
            .soundscape-actions {
                flex-direction: column;
                align-items: stretch;
            }

            .download-progress {
                min-width: auto;
            }
        }

        /* Toast animations */
        @keyframes slideUp {
            from {
                opacity: 0;
                transform: translateX(-50%) translateY(20px);
            }
            to {
                opacity: 1;
                transform: translateX(-50%) translateY(0);
            }
        }

        @keyframes slideDown {
            from {
                opacity: 1;
                transform: translateX(-50%) translateY(0);
            }
            to {
                opacity: 0;
                transform: translateX(-50%) translateY(20px);
            }
        }

        /* Debug Toggle Icon (lower left corner) */
        .debug-toggle {
            position: fixed;
            bottom: 10px;
            left: 10px;
            background: rgba(0, 0, 0, 0.6);
            border: 1px solid rgba(255, 255, 255, 0.2);
            color: #00d9ff;
            width: 36px;
            height: 36px;
            border-radius: 8px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.2em;
            transition: all 0.2s;
            z-index: 999;
        }

        .debug-toggle:hover {
            background: rgba(0, 217, 255, 0.3);
            border-color: #00d9ff;
            transform: scale(1.1);
        }

        .debug-toggle.hidden {
            opacity: 0.5;
        }

        /* Debug Console Modal */
        .debug-modal {
            display: none;
            position: fixed;
            bottom: 60px;
            left: 10px;
            width: calc(100% - 20px);
            max-width: 500px;
            max-height: 60vh;
            background: rgba(0, 0, 0, 0.95);
            border: 1px solid rgba(255, 255, 255, 0.2);
            border-radius: 8px;
            z-index: 1000;
            overflow: hidden;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.5);
        }

        .debug-modal.visible {
            display: flex;
            flex-direction: column;
        }

        .debug-modal-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 10px 15px;
            background: rgba(255, 255, 255, 0.1);
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
        }

        .debug-modal-title {
            font-size: 0.9em;
            font-weight: 600;
            color: #00d9ff;
        }

        .debug-modal-actions {
            display: flex;
            gap: 8px;
        }

        .debug-copy-btn {
            background: rgba(0, 217, 255, 0.2);
            border: 1px solid rgba(0, 217, 255, 0.5);
            color: #00d9ff;
            padding: 4px 10px;
            border-radius: 4px;
            cursor: pointer;
            font-size: 0.85em;
            transition: all 0.2s;
        }

        .debug-copy-btn:hover {
            background: rgba(0, 217, 255, 0.3);
        }

        .debug-modal-close {
            background: none;
            border: none;
            color: #fff;
            font-size: 1.5em;
            cursor: pointer;
            padding: 0;
            width: 28px;
            height: 28px;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: opacity 0.2s;
        }

        .debug-modal-close:hover {
            opacity: 0.7;
        }

        .debug-update-btn {
            background: rgba(0, 217, 255, 0.2);
            border: none;
            color: #00d9ff;
            font-size: 1em;
            cursor: pointer;
            padding: 4px 8px;
            border-radius: 4px;
            transition: all 0.2s;
        }

        .debug-update-btn:hover {
            background: rgba(0, 217, 255, 0.4);
        }

        .debug-modal-content {
            flex: 1;
            overflow-y: auto;
            padding: 10px;
            font-family: 'Consolas', 'Monaco', monospace;
            font-size: 0.8em;
            line-height: 1.5;
            background: #0d0d1a;
        }

        .debug-line {
            display: block;
            padding: 2px 0;
            white-space: pre-wrap;
            word-break: break-all;
        }

        .debug-line.error {
            color: #ff6b6b;
        }

        .debug-line.warn {
            color: #ffd93d;
        }

        .debug-line.info {
            color: #00ff88;
        }

        .debug-line.debug {
            color: #888;
        }
    </style>
</head>
<body>
    <!-- Error Overlay (must be first to catch all errors) -->
    <div id="errorOverlay" style="display:none;position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,0.95);z-index:99999;padding:20px;overflow-y:auto;">
        <div style="background:#1a1a2e;border:2px solid #ff6b6b;border-radius:8px;padding:20px;max-width:600px;margin:20px auto;">
            <h2 style="color:#ff6b6b;margin-top:0;">⚠️ JavaScript Error</h2>
            <div id="errorContent" style="font-family:monospace;font-size:0.85em;color:#fff;white-space:pre-wrap;word-break:break-all;"></div>
            <button onclick="location.reload()" style="margin-top:15px;background:#00d9ff;border:none;padding:10px 20px;border-radius:4px;cursor:pointer;font-size:1em;">🔄 Reload Page</button>
            <button onclick="document.getElementById('errorOverlay').style.display='none'" style="margin-top:10px;margin-left:10px;background:#666;border:none;padding:10px 20px;border-radius:4px;cursor:pointer;font-size:1em;color:#fff;">✕ Close</button>
        </div>
    </div>

    <script>
        // Global error handler - catches ALL JavaScript errors
        window.onerror = function(msg, url, line, col, error) {
            console.error('Global error:', msg, error);
            
            const errorOverlay = document.getElementById('errorOverlay');
            const errorContent = document.getElementById('errorContent');
            
            if (errorOverlay && errorContent) {
                const errorDetails = [
                    'Message: ' + msg,
                    'File: ' + url,
                    'Line: ' + line,
                    'Column: ' + col,
                    '',
                    'Stack:',
                    error ? error.stack : 'No stack trace'
                ].join('\n');
                
                errorContent.textContent = errorDetails;
                errorOverlay.style.display = 'block';
                
                // Also log to debug window if it exists
                if (window.app && typeof window.app._debugLog === 'function') {
                    window.app._debugLog('❌ Fatal error: ' + msg, 'error');
                }
            }
            
            return false; // Don't suppress default error handling
        };

        // Catch unhandled promise rejections
        window.onunhandledrejection = function(event) {
            console.error('Unhandled promise rejection:', event.reason);
            
            const errorOverlay = document.getElementById('errorOverlay');
            const errorContent = document.getElementById('errorContent');
            
            if (errorOverlay && errorContent) {
                const errorDetails = [
                    'Unhandled Promise Rejection',
                    '',
                    'Reason:',
                    event.reason ? (event.reason.message || event.reason) : 'Unknown',
                    '',
                    'Stack:',
                    event.reason ? event.reason.stack : 'No stack trace'
                ].join('\n');
                
                errorContent.textContent = errorDetails;
                errorOverlay.style.display = 'block';
            }
        };

        console.log('[soundscape_picker.html] Error handlers installed');
    </script>

    <button class="logout-btn" id="logoutBtn">Logout</button>

    <!-- Service Worker Status Indicator -->
    <div id="swStatus" style="position:fixed;top:10px;right:10px;background:rgba(0,0,0,0.8);padding:8px 12px;border-radius:6px;font-size:0.8em;z-index:9999;display:flex;align-items:center;gap:6px;">
        <span id="swStatusIcon">🟢</span>
        <span id="swStatusText">Online</span>
    </div>

    <div class="container">
        <button class="back-btn" id="backBtn">← Back</button>

        <h1>
            <span><span class="icon">🎧</span> Choose Soundscape</span>
            <a class="new-soundscape-link" id="newSoundscapeLink">+ New Soundscape</a>
        </h1>
        <p class="subtitle">Select an experience to play</p>
        
        <ul id="soundscapeList">
            <li class="loading">Loading soundscapes...</li>

    </div>

    <!-- Debug Toggle Icon (lower left corner) -->
    <button class="debug-toggle" id="debugToggleBtn" title="Toggle debug log">
        📋
    </button>

    <!-- Debug Console Modal -->
    <div class="debug-modal" id="debugModal">
        <div class="debug-modal-header">
            <span class="debug-modal-title">📋 Debug Log</span>
            <div class="debug-modal-actions">
                <button class="debug-copy-btn" id="debugCopyBtn" title="Copy to clipboard">📋 Copy</button>
                <button class="debug-update-btn" id="debugUpdateBtn" title="Force update (clear SW cache)">🔄</button>
                <button class="debug-modal-close" id="debugCloseBtn">×</button>
            </div>
        </div>
        <div class="debug-modal-content" id="debugModalContent">
<span class="debug-line info">[picker] 🗺️ Soundscape Picker initializing...</span>
<span class="debug-line info">[picker] 🔧 Checking login status...</span>
<span class="debug-line info">[picker] 📡 Fetching soundscapes from server...</span>

    <!-- Scripts loaded in order: api-client → soundscape → download_manager → app -->
    <script src="api-client.js"></script>
    <script>
        // Use relative URL - Cloudflare will handle HTTPS
        window.API_BASE_URL = '/api';
    </script>
    <script src="sw-register.js"></script>
    <script src="soundscape.js"></script>
    <script src="download_manager.js"></script>

    <!-- Service Worker Registration (for offline support) -->
    <script>
        // Use shared SW registration module
        registerServiceWorker({
            onReady: (registration) => {
                console.log('[soundscape_picker] SW ready');
                localStorage.setItem('sw_ready', 'true');
            },
            onUpdate: (registration) => {
                console.log('[soundscape_picker] SW update available');
            },
            onError: (error) => {
                console.error('[soundscape_picker] SW error:', error);
            }
        });
    </script>

    <!-- Service Worker Status Updates -->
    <script>
        // Update Service Worker status indicator
        function updateSWStatus(icon, text, color) {
            const iconEl = document.getElementById('swStatusIcon');
            const textEl = document.getElementById('swStatusText');
            const statusEl = document.getElementById('swStatus');

            if (iconEl) iconEl.textContent = icon;
            if (textEl) textEl.textContent = text;
            if (statusEl && color) {
                statusEl.style.background = color;
            }
        }

        // Check Service Worker status
        if ('serviceWorker' in navigator) {
            navigator.serviceWorker.getRegistration()
                .then((registration) => {
                    if (registration && registration.active) {
                        console.log('[SW] Service Worker active');
                        // Hide status indicator when SW is active (works silently)
                        const swStatusEl = document.getElementById('swStatus');
                        if (swStatusEl) swStatusEl.style.display = 'none';
                    } else {
                        updateSWStatus('⏳', 'Installing...', 'rgba(255, 193, 7, 0.3)');
                    }
                })
                .catch(() => {
                    updateSWStatus('⚠️', 'SW unavailable', 'rgba(255, 107, 107, 0.3)');
                });

            // Listen for SW state changes
            navigator.serviceWorker.addEventListener('message', (event) => {
                if (event.data === 'activated') {
                    console.log('[SW] Service Worker activated');
                    // Hide status indicator when SW is active
                    const swStatusEl = document.getElementById('swStatus');
                    if (swStatusEl) swStatusEl.style.display = 'none';
                }
            });
            
            // Update status on online/offline
            window.addEventListener('online', () => {
                updateSWStatus('🟢', 'Online', 'rgba(0, 217, 255, 0.3)');
            });
            window.addEventListener('offline', () => {
                const swReady = localStorage.getItem('sw_ready') === 'true';
                if (swReady) {
                    updateSWStatus('📴', 'Offline (cached)', 'rgba(0, 255, 136, 0.3)');
                } else {
                    updateSWStatus('❌', 'Offline (not cached)', 'rgba(255, 107, 107, 0.3)');
                }
            });
        } else {
            updateSWStatus('❌', 'No SW support', 'rgba(255, 107, 107, 0.3)');
        }
    </script>
    <script>
        /**
         * SoundscapePickerApp - List soundscapes and allow user to select one
         *
         * Flow:
         * 1. Check login status (redirect to index.html if not logged in)
         * 2. Fetch all soundscapes from server
         * 3. Display as clickable list
         * 4. On click: store selection in localStorage
         *    - Desktop → redirect to map_editor_v2.html
         *    - Phone/Tablet → redirect to map_player.html
         */
        class SoundscapePickerApp {
            constructor() {
                console.log('[SoundscapePicker] Constructor starting...');

                try {
                    // GUARD: Verify download_manager.js loaded correctly
                    if (typeof OfflineDownloadManager === 'undefined') {
                        const errorMsg = '❌ CRITICAL: download_manager.js failed to load!';
                        console.error(errorMsg);
                        console.error('   File may be corrupted on server or cache is stale');
                        
                        // Show visible error to user
                        const errorDiv = document.createElement('div');
                        errorDiv.style.cssText = 'background:#ff0000;color:#fff;padding:20px;margin:20px;border-radius:8px;font-size:1.1em;';
                        errorDiv.innerHTML = `
                            <strong>⚠️ File Corruption Detected</strong><br><br>
                            The app failed to load correctly. This usually means:<br>
                            1️⃣ Server has old/corrupted files<br>
                            2️⃣ Browser cache is stale<br><br>
                            <strong>Fix:</strong> Clear browser cache and refresh.<br>
                            <button onclick="location.reload()" style="margin-top:10px;padding:10px 20px;background:#fff;color:#000;border:none;border-radius:4px;cursor:pointer;">🔄 Refresh Page</button>
                            <button onclick="clearAllCaches()" style="margin-top:10px;margin-left:10px;padding:10px 20px;background:#fff;color:#000;border:none;border-radius:4px;cursor:pointer;">🗑️ Clear All Caches</button>
                        `;
                        document.body.insertBefore(errorDiv, document.body.firstChild);
                        
                        // Add cache clear function
                        window.clearAllCaches = function() {
                            caches.keys().then(names => {
                                names.forEach(name => caches.delete(name));
                            }).then(() => {
                                localStorage.clear();
                                location.reload();
                            });
                        };
                        
                        throw new Error('OfflineDownloadManager is not defined - file corruption');
                    }

                    this.api = new ApiClient('/api');
                    console.log('[SoundscapePicker] ApiClient created');

                    this.soundscapes = [];
                    console.log('[SoundscapePicker] soundscapes array initialized');

                    this.downloadManager = new OfflineDownloadManager();
                    console.log('[SoundscapePicker] OfflineDownloadManager created');

                    // Track online/offline status
                    this.isOnline = navigator.onLine;
                    console.log('[SoundscapePicker] Initial online status:', this.isOnline);

                    // Listen for progress events
                    window.addEventListener('offline-download-progress', (e) => {
                        this._onDownloadProgress(e.detail);
                    });
                    console.log('[SoundscapePicker] Progress event listener added');

                    // Listen for online/offline events
                    window.addEventListener('online', () => this._onOnlineStatusChange());
                    window.addEventListener('offline', () => this._onOnlineStatusChange());
                    console.log('[SoundscapePicker] Online/offline event listeners added');

                    console.log('[SoundscapePicker] Constructor complete');
                } catch (error) {
                    console.error('[SoundscapePicker] Constructor error:', error);
                    throw error;
                }
            }
            
            /**
             * Initialize the picker app
             */
            async init() {
                try {
                    this._debugLog('[picker] 🗺️ Soundscape Picker initializing...', 'info');
                    console.log('[SoundscapePicker] Initializing...');

                    // Check device type and hide "New Soundscape" button on phones
                    this._checkDeviceType();

                    await this._checkLoginStatus();
                    await this._loadSoundscapes();
                    this._setupEventListeners();

                    this._debugLog('[picker] ✅ Ready', 'info');
                    console.log('[SoundscapePicker] Ready');
                } catch (error) {
                    this._debugLog('[picker] ❌ Initialization error: ' + error.message, 'error');
                    console.error('[SoundscapePicker] Initialization error:', error);
                    const listEl = document.getElementById('soundscapeList');
                    if (listEl) {
                        listEl.innerHTML = `
                            <li class="error">
                                <strong>Failed to initialize</strong><br><br>
                                ${error.message || 'Unknown error'}<br><br>
                                <small>Check console (F12) for details</small>
                            </li>
                        `;
                    }
                }
            }

            /**
             * Check device type and hide "New Soundscape" button on phones
             * Also hide download buttons on desktop
             * Checks for mode=editor or mode=player query parameter (tablet choice)
             * @private
             */
            _checkDeviceType() {
                const ua = navigator.userAgent;
                const isPhone = /iPhone|iPod|Android.*Mobile|IEMobile|Opera Mini/i.test(ua);
                const isTablet = /iPad|Android(?!.*Mobile)|Tablet|Silk/i.test(ua);
                const isDesktop = !isPhone && !isTablet;

                // Check for explicit mode from tablet (via query parameter)
                const params = new URLSearchParams(window.location.search);
                const modeParam = params.get('mode'); // 'editor' or 'player'

                this._debugLog(`[picker] 🔍 Mode parameter: ${modeParam || 'auto-detect'}`, 'info');

                // Determine mode: explicit parameter takes precedence, then auto-detect
                let forceEditorMode = false;
                let forcePlayerMode = false;

                if (modeParam === 'editor') {
                    forceEditorMode = true;
                    this._debugLog('[picker] 🖥️ Tablet Editor mode (explicit)', 'info');
                } else if (modeParam === 'player') {
                    forcePlayerMode = true;
                    this._debugLog('[picker] 📱 Tablet Player mode (explicit)', 'info');
                }

                // Phone: always player mode
                if (isPhone) {
                    this._debugLog('[picker] 📱 Phone detected - hiding "New Soundscape" button', 'info');
                    const link = document.getElementById('newSoundscapeLink');
                    if (link) {
                        link.classList.add('hidden');
                        link.style.pointerEvents = 'none';
                        link.title = 'Create soundscapes on PC or tablet';
                    }
                    // Phone: show download buttons (player mode)
                }
                // Desktop or Tablet Editor: editor mode
                else if (isDesktop || forceEditorMode) {
                    this._debugLog('[picker] 🖥️ Editor mode - hiding download buttons', 'info');
                    // Hide download buttons
                    const style = document.createElement('style');
                    style.textContent = `
                        .download-btn, .download-progress, .offline-status {
                            display: none !important;
                        }
                    `;
                    document.head.appendChild(style);
                }
                // Tablet Player: player mode (show download buttons, hide New Soundscape)
                else if (isTablet && forcePlayerMode) {
                    this._debugLog('[picker] 📱 Tablet Player mode - showing download buttons', 'info');
                    // Tablet player mode: show download buttons, hide "New Soundscape"
                    const link = document.getElementById('newSoundscapeLink');
                    if (link) {
                        link.classList.add('hidden');
                        link.style.pointerEvents = 'none';
                        link.title = 'Create soundscapes on PC or tablet';
                    }
                }
            }
            
            /**
             * Check if user is logged in
             * @private
             */
            async _checkLoginStatus() {
                this._debugLog('[picker] 🔧 Checking login status...', 'info');

                // Check if we're offline
                if (!navigator.onLine) {
                    this._debugLog('[picker] 📴 Offline mode - checking for offline access', 'info');
                    
                    // Check if token exists (user was logged in before)
                    const token = localStorage.getItem('audio_ar_token');
                    
                    // Check if we have offline soundscapes
                    const cachedSoundscapes = await this.downloadManager.getAllCachedSoundscapes();
                    
                    if (token && cachedSoundscapes.length > 0) {
                        this._debugLog('[picker] ✅ Has token + offline soundscapes - allowing access', 'info');
                        return; // Allow access to offline soundscapes
                    } else if (!token) {
                        this._debugLog('[picker] ⚠️ No token - redirecting to login', 'warn');
                        window.location.href = 'index.html';
                        return;
                    } else {
                        this._debugLog('[picker] ⚠️ No offline soundscapes - redirecting to login', 'warn');
                        window.location.href = 'index.html';
                        return;
                    }
                }

                // Online - verify token with server
                const token = localStorage.getItem('audio_ar_token');
                if (!token) {
                    this._debugLog('[picker] ⚠️ No token - redirecting to login', 'warn');
                    console.log('[SoundscapePicker] Not logged in - redirecting to index.html');
                    window.location.href = 'index.html';
                    return;
                }

                this.api.token = token;
                this._debugLog('[picker] ✓ Token found', 'info');

                // Verify token is still valid (with timeout)
                try {
                    this._debugLog('[picker] 📡 Verifying token...', 'info');
                    const valid = await Promise.race([
                        this.api.verifyToken(),
                        new Promise((_, reject) =>
                            setTimeout(() => reject(new Error('Token verification timeout')), 5000)
                        )
                    ]);

                    if (!valid) {
                        this._debugLog('[picker] ❌ Token invalid - redirecting to login', 'warn');
                        console.log('[SoundscapePicker] Token invalid - redirecting to index.html');
                        localStorage.removeItem('audio_ar_token');
                        window.location.href = 'index.html';
                        return;
                    }

                    this._debugLog('[picker] ✅ User logged in', 'info');
                    console.log('[SoundscapePicker] User logged in');
                } catch (error) {
                    this._debugLog('[picker] ❌ Token verification failed: ' + error.message, 'error');
                    console.error('[SoundscapePicker] Token verification failed:', error);
                    // Don't redirect - let user try again
                }
            }
            
            /**
             * Load soundscapes from server
             * @private
             */
            async _loadSoundscapes() {
                const listEl = document.getElementById('soundscapeList');
                
                // Check if we're online or offline
                if (!this.isOnline) {
                    this._debugLog('[picker] 📴 Offline mode - showing only offline soundscapes', 'warn');
                    console.log('[SoundscapePicker] Offline mode - showing only offline soundscapes');
                    await this._loadOfflineSoundscapesOnly();
                    return;
                }

                this._debugLog('[picker] 📡 Fetching soundscapes from server...', 'info');

                try {
                    // Fetch with timeout (10 seconds)
                    this.soundscapes = await Promise.race([
                        this.api.getSoundscapes(),
                        new Promise((_, reject) =>
                            setTimeout(() => reject(new Error('Network timeout - server not responding')), 10000)
                        )
                    ]);

                    this._debugLog(`[picker] ✅ Loaded ${this.soundscapes.length} soundscape(s)`, 'info');

                    if (this.soundscapes.length === 0) {
                        listEl.innerHTML = `
                            <li class="empty">
                                <strong>No soundscapes found</strong><br><br>
                                Create a soundscape in the Editor first, then come back here to play it.
                            </li>
                        `;
                        this._debugLog('[picker] ⚠️ No soundscapes found', 'warn');
                        return;
                    }

                    this._renderList();

                    // Check which soundscapes are available offline
                    await this._checkOfflineStatus();

                    this._debugLog('[picker] ✅ Ready', 'info');
                    console.log(`[SoundscapePicker] Loaded ${this.soundscapes.length} soundscape(s)`);
                } catch (err) {
                    this._debugLog('[picker] ❌ Failed: ' + err.message, 'error');
                    console.error('[SoundscapePicker] Failed to load soundscapes:', err);
                    
                    // If server fails, assume offline and show offline soundscapes
                    this._debugLog('[picker] ⚠️ Server unreachable - switching to offline mode', 'warn');
                    await this._loadOfflineSoundscapesOnly();
                }
            }

            /**
             * Load only offline soundscapes (when device is in airplane mode)
             * Scans all cached soundscapes and displays them
             * @private
             */
            async _loadOfflineSoundscapesOnly() {
                const listEl = document.getElementById('soundscapeList');
                this._debugLog('[picker] 📂 Loading offline soundscapes...', 'info');

                try {
                    // Get all cached soundscapes from Cache API
                    const cachedSoundscapes = await this.downloadManager.getAllCachedSoundscapes();

                    if (cachedSoundscapes.length === 0) {
                        listEl.innerHTML = `
                            <li class="empty">
                                <strong>📴 No offline soundscapes available</strong><br><br>
                                You're currently offline (airplane mode).<br><br>
                                To listen to soundscapes offline, you need to:<br>
                                1️⃣ Turn off airplane mode<br>
                                2️⃣ Download soundscapes while online<br>
                                3️⃣ Turn airplane mode back on
                            </li>
                        `;
                        this._debugLog('[picker] ⚠️ No offline soundscapes found', 'warn');
                        return;
                    }

                    this._debugLog(`[picker] ✅ Found ${cachedSoundscapes.length} offline soundscape(s)`, 'info');

                    // Store count for index.html redirect check
                    localStorage.setItem('offline_soundscapes_count', cachedSoundscapes.length.toString());

                    // Build soundscape objects from cached data + stored metadata
                    // Use the new full soundscape data storage (Feature 15 offline mode)
                    this.soundscapes = [];

                    for (const cached of cachedSoundscapes) {
                        // Try to get stored full soundscape data from localStorage (new format)
                        const storedData = localStorage.getItem('offline_soundscape_full_' + cached.id);

                        if (!storedData) {
                            this._debugLog(`[picker] ⚠️ Skipping ${cached.id} - no offline data found`, 'warn');
                            continue;  // Skip soundscapes without stored data
                        }

                        let soundscapeData = null;
                        try {
                            soundscapeData = JSON.parse(storedData);
                        } catch (err) {
                            console.warn('[SoundscapePicker] Failed to parse stored soundscape data:', err);
                            this._debugLog(`[picker] ⚠️ Skipping ${cached.id} - corrupted data`, 'warn');
                            continue;  // Skip corrupted data
                        }

                        // Add to list from stored soundscape data
                        this.soundscapes.push({
                            id: soundscapeData.id,
                            name: soundscapeData.name,
                            waypointCount: (soundscapeData.waypoints || []).length,
                            updatedAt: soundscapeData.downloadedAt,
                            isOfflineOnly: true  // Flag to mark as offline-only
                        });

                        this._debugLog(`[picker] ✅ Loaded offline soundscape: ${soundscapeData.name}`, 'info');
                    }

                    this._debugLog(`[picker] 📊 ${this.soundscapes.length}/${cachedSoundscapes.length} soundscapes available`, 'info');

                    if (this.soundscapes.length === 0) {
                        listEl.innerHTML = `
                            <li class="offline-notice">
                                📴 <strong>Offline Mode</strong> - Only showing soundscapes available offline.
                            </li>
                            <li class="empty">
                                <strong>📴 No offline soundscapes available</strong><br><br>
                                You're currently offline (airplane mode).<br><br>
                                To listen to soundscapes offline, you need to:<br>
                                1️⃣ Turn off airplane mode<br>
                                2️⃣ Download soundscapes while online<br>
                                3️⃣ Turn airplane mode back on
                            </li>
                        `;
                        this._debugLog('[picker] ⚠️ No offline soundscapes with metadata found', 'warn');
                        return;
                    }

                    this._renderOfflineList();

                    this._debugLog('[picker] ✅ Offline mode ready', 'info');
                } catch (err) {
                    this._debugLog('[picker] ❌ Failed to load offline soundscapes: ' + err.message, 'error');
                    console.error('[SoundscapePicker] Failed to load offline soundscapes:', err);
                    listEl.innerHTML = `
                        <li class="error">
                            <strong>Failed to load offline soundscapes</strong><br><br>
                            ${err.message}<br><br>
                            <button onclick="location.reload()" style="background:#00d9ff;border:none;padding:8px 16px;border-radius:4px;cursor:pointer;">🔄 Retry</button>
                        </li>
                    `;
                }
            }

            /**
             * Render offline soundscape list (simplified UI for offline mode)
             * @private
             */
            _renderOfflineList() {
                const listEl = document.getElementById('soundscapeList');

                listEl.innerHTML = `
                    <li class="offline-notice">
                        📴 <strong>Offline Mode</strong> - Only showing soundscapes available offline.
                    </li>
                ` + this.soundscapes.map(ss => `
                    <li class="soundscape-item" data-id="${ss.id}">
                        <div class="soundscape-name">${this._escapeHtml(ss.name)}</div>
                        <div class="soundscape-meta">
                            <span><span class="icon">🔊</span>${ss.waypointCount || 0} audio file(s)</span>
                            <span class="offline-status" style="display: inline-flex;">
                                ✅ Available Offline
                            </span>
                        </div>
                    </li>
                `).join('');

                // Add click handlers for soundscape selection
                listEl.querySelectorAll('.soundscape-item').forEach(item => {
                    item.addEventListener('click', (e) => {

                        }

                    btn.addEventListener('click', (e) => {

                        const id = btn.closest('[data-id]').dataset.id;
                        this._deleteOfflineCache(id);
                    });
                });

            /**
             * Handle online/offline status change
             * @private
             */
            _onOnlineStatusChange() {
                const wasOnline = this.isOnline;
                this.isOnline = navigator.onLine;

                if (wasOnline !== this.isOnline) {
                    this._debugLog(`[picker] 📡 Network status changed: ${this.isOnline ? '🟢 Online' : '📴 Offline'}`, 'info');
                    console.log('[SoundscapePicker] Network status changed:', this.isOnline ? 'online' : 'offline');

                    // Reload soundscapes when status changes
                    if (this.isOnline) {
                        this._debugLog('[picker] 🔄 Back online - reloading from server...', 'info');
                        this._loadSoundscapes();
                    } else {
                        this._debugLog('[picker] 📴 Went offline - switching to offline mode', 'warn');
                        this._loadOfflineSoundscapesOnly();
                    }
                }
            }

            /**
             * Render soundscape list
             * @private
             */
            _renderList() {
                const listEl = document.getElementById('soundscapeList');

                const sorted = [...this.soundscapes].sort((a, b) => {
                    return new Date(b.updatedAt) - new Date(a.updatedAt);
                });

                    <li class="soundscape-item" data-id="${ss.id}">

                        <div class="soundscape-meta">

                            <span><span class="icon">📅</span>${this._formatDate(ss.updatedAt)}</span>
                        </div>

                        <!-- Download actions -->
                        <div class="soundscape-actions">
                            <button class="download-btn"
                                    title="Download for offline playback"
                                    data-soundscape-id="${ss.id}">
                                📥 Download
                            </button>

                            <div class="download-progress" style="display: none;">
                                <div class="progress-bar">
                                    <div class="progress-fill" style="width: 0%"></div>
                                </div>
                                <span class="progress-text">0%</span>
                            </div>

                            <div class="offline-status" style="display: none;">

                                </button>

                    });
                });

            /**
             * Download soundscape for offline playback
             * @param {string} soundscapeId - Soundscape ID
             * @private
             */
            async _downloadSoundscape(soundscapeId) {
                const soundscape = this.soundscapes.find(ss => ss.id === soundscapeId);
                if (!soundscape) {
                    console.error('[OfflineDownload] Soundscape not found:', soundscapeId);
                    return;
                }

                // Fetch full soundscape data (with waypoints)
                const btn = document.querySelector(`.download-btn[data-soundscape-id="${soundscapeId}"]`);
                const originalText = btn.textContent;
                btn.disabled = true;
                btn.textContent = '⏳ Downloading...';

                try {
                    console.log(`[OfflineDownload] Fetching full soundscape data: ${soundscapeId}`);
                    const fullData = await this.api.getSoundscape(soundscapeId);
                    const waypoints = fullData.waypoints || [];
                    const areas = fullData.areas || [];

                    if (waypoints.length === 0 && areas.length === 0) {
                        alert('This soundscape has no sounds to download');
                        btn.disabled = false;
                        btn.textContent = originalText;
                        return;
                    }

                    // Extract unique URLs for logging and size check (from waypoints AND areas)
                    const waypointUrls = waypoints.map(wp => wp.soundUrl).filter(url => url);
                    const areaUrls = areas.map(a => a.soundUrl).filter(url => url);
                    const urls = [...new Set([...waypointUrls, ...areaUrls])];
                    
                    console.log(`[OfflineDownload] 📍 Waypoints: ${waypoints.length}`);
                    console.log(`[OfflineDownload] 🗺️ Areas: ${areas.length}`);
                    console.log(`[OfflineDownload] Will download ${urls.length} unique file(s):`, urls);

                    // Check for large files (>50 MB) and warn user
                    const largeFiles = [];
                    for (const url of urls) {
                        try {
                            const headResponse = await fetch(url, { method: 'HEAD' });
                            const contentLength = headResponse.headers.get('content-length');
                            if (contentLength) {
                                const sizeMB = parseInt(contentLength) / 1024 / 1024;
                                if (sizeMB > 50) {
                                    largeFiles.push({ url, size: sizeMB.toFixed(1) });
                                }
                            }
                        } catch (err) {
                            console.warn(`[OfflineDownload] Could not check size for: ${url}`);
                        }
                    }

                    if (largeFiles.length > 0) {
                        const sizeList = largeFiles.map(f => `${f.size} MB`).join(', ');
                        const confirmMsg = `⚠️ This soundscape contains large audio files (${sizeList}).\n\nDownload size: ~${largeFiles.reduce((sum, f) => sum + parseFloat(f.size), 0).toFixed(0)} MB\n\nThis may take several minutes and use significant mobile data.\n\nDo you want to continue?`;
                        if (!confirm(confirmMsg)) {
                            btn.disabled = false;
                            btn.textContent = originalText;
                            return;
                        }
                    }

                    // Show progress bar immediately
                    const itemEl = document.querySelector(`.soundscape-item[data-id="${soundscapeId}"]`);
                    const progressEl = itemEl ? itemEl.querySelector('.download-progress') : null;
                    if (progressEl) {
                        progressEl.style.display = 'flex';
                        progressEl.querySelector('.progress-fill').style.width = `0%`;
                        progressEl.querySelector('.progress-text').textContent = `Starting...`;
                    }

                    // Start download
                    console.log(`[OfflineDownload] Calling downloadSoundscape()...`);
                    this._debugLog(`📥 Starting download: ${soundscape.name}`, 'info');
                    this._debugLog(`📍 Waypoints to download: ${waypoints.length}`, 'info');
                    this._debugLog(`🗺️ Areas to download: ${areas.length}`, 'info');
                    this._debugLog(`📦 Areas data: ${JSON.stringify(areas.map(a => ({ id: a.id, name: a.name, soundUrl: a.soundUrl })))}`, 'info');

                    // Pass restructured data: areas, behaviors inside soundscapeData object
                    const result = await this.downloadManager.downloadSoundscape(
                        soundscapeId,
                        soundscape.name,
                        waypoints,
                        {
                            soundscape: fullData.soundscape,
                            behaviors: fullData.behaviors || [],
                            areas: areas
                        }
                    );

                    console.log(`[OfflineDownload] downloadSoundscape() returned:`, result);

                    // Hide progress bar after completion
                    if (progressEl) {
                        progressEl.style.display = 'none';
                    }

                    if (result.success) {
                        this._markAsOffline(soundscapeId);
                        this._showToast(`✅ Downloaded ${result.downloaded} audio file(s)`, 'success');
                    } else {
                        // Show which files failed in the toast (just filenames, not full URLs)
                        const failedNames = result.failedUrls
                            .map(url => url.split('/').pop())
                            .slice(0, 3) // Show max 3 filenames
                            .join(', ');
                        
                        const msg = `⚠️ ${result.downloaded}/${result.total} downloaded. Failed: ${failedNames}${result.failed > 3 ? '...' : ''}`;
                        this._showToast(msg, 'warning');
                    }

                } catch (error) {
                    console.error('[OfflineDownload] Error:', error);
                    this._showToast(`❌ Download failed: ${error.message}`, 'error');
                } finally {
                    btn.disabled = false;
                    btn.textContent = originalText;
                }
            }

            /**
             * Handle download progress update
             * @param {{soundscapeId: string, downloaded: number, total: number, percent: number}} detail
             * @private
             */
            _onDownloadProgress({ soundscapeId, downloaded, total, percent }) {
                this._debugLog(`[picker] 📊 Progress: ${percent}% (${downloaded}/${total})`, 'info');

                // Find the soundscape item by data-id attribute (set on <li>)
                const itemEl = document.querySelector(`.soundscape-item[data-id="${soundscapeId}"]`);
                
                if (itemEl) {
                    const progressEl = itemEl.querySelector('.download-progress');
                    if (progressEl) {
                        progressEl.style.display = 'flex';
                        progressEl.querySelector('.progress-fill').style.width = `${percent}%`;
                        progressEl.querySelector('.progress-text').textContent = `${percent}% (${downloaded}/${total})`;
                        this._debugLog(`[picker] ✅ Progress bar updated`, 'info');
                    } else {
                        this._debugLog(`[picker] ❌ Progress bar element not found!`, 'error');
                    }
                } else {
                    this._debugLog(`[picker] ❌ Soundscape item not found!`, 'error');
                }
            }

            /**
             * Mark soundscape as available offline
             * @param {string} soundscapeId
             * @private
             */
            _markAsOffline(soundscapeId) {
                const itemEl = document.querySelector(`.soundscape-item[data-id="${soundscapeId}"]`);

                if (itemEl) {
                    const downloadBtn = itemEl.querySelector('.download-btn');
                    const progressEl = itemEl.querySelector('.download-progress');
                    const statusEl = itemEl.querySelector('.offline-status');

                    if (downloadBtn) downloadBtn.style.display = 'none';
                    if (progressEl) progressEl.style.display = 'none';
                    if (statusEl) statusEl.style.display = 'flex';
                }

                // Note: Full soundscape data is already stored by download_manager.js
                // in offline_soundscape_full_{id} - no need to store duplicate metadata
                this._debugLog(`[picker] 📝 Marked as offline (data stored by download manager)`, 'info');
            }

            /**
             * Delete offline cache
             * @param {string} soundscapeId
             * @private
             */
            async _deleteOfflineCache(soundscapeId) {
                if (!confirm('Remove offline copy? You can re-download anytime.')) {
                    return;
                }

                try {
                    await this.downloadManager.deleteOfflineCache(soundscapeId);
                    this._showToast('Offline copy removed', 'info');

                    // Update offline soundscapes count for index.html redirect
                    const cachedSoundscapes = await this.downloadManager.getAllCachedSoundscapes();
                    if (cachedSoundscapes.length === 0) {
                        localStorage.removeItem('offline_soundscapes_count');
                    } else {
                        localStorage.setItem('offline_soundscapes_count', cachedSoundscapes.length.toString());
                    }
                    this._debugLog(`[picker] 🗑️ Updated offline count: ${cachedSoundscapes.length}`, 'info');

                    // Update UI
                    const itemEl = document.querySelector(`.soundscape-item[data-id="${soundscapeId}"]`);

                    if (itemEl) {
                        const downloadBtn = itemEl.querySelector('.download-btn');
                        const statusEl = itemEl.querySelector('.offline-status');

                        if (downloadBtn) {
                            downloadBtn.style.display = 'inline-flex';
                            downloadBtn.disabled = false;
                            downloadBtn.textContent = '📥 Download';
                        }
                        if (statusEl) statusEl.style.display = 'none';
                    }
                } catch (error) {
                    console.error('[OfflineDownload] Error deleting cache:', error);
                    this._showToast(`Failed to remove: ${error.message}`, 'error');
                }
            }

            /**
             * Show toast notification
             * @param {string} message
             * @param {'success' | 'error' | 'warning' | 'info'} type
             * @private
             */
            _showToast(message, type = 'info') {
                // Create toast element
                const toast = document.createElement('div');
                toast.textContent = message;
                toast.style.cssText = `
                    position: fixed;
                    bottom: 20px;
                    left: 50%;
                    transform: translateX(-50%);
                    background: ${type === 'success' ? 'rgba(0, 255, 136, 0.9)' : 
                               type === 'error' ? 'rgba(233, 69, 96, 0.9)' :
                               type === 'warning' ? 'rgba(255, 193, 7, 0.9)' :
                               'rgba(0, 217, 255, 0.9)'};
                    color: #000;
                    padding: 12px 24px;
                    border-radius: 8px;
                    font-size: 0.9em;
                    font-weight: 600;
                    z-index: 10000;
                    animation: slideUp 0.3s ease-out;
                `;

                document.body.appendChild(toast);

                // Remove after 3 seconds
                setTimeout(() => {
                    toast.style.animation = 'slideDown 0.3s ease-out reverse';
                    setTimeout(() => toast.remove(), 300);
                }, 3000);
            }

            /**
             * Check which soundscapes are available offline
             * @private
             */
            async _checkOfflineStatus() {
                console.log('[OfflineDownload] Checking offline status...');
                
                for (const ss of this.soundscapes) {
                    const isOffline = await this.downloadManager.isAvailableOffline(ss.id);
                    if (isOffline) {
                        this._markAsOffline(ss.id);
                    }
                }
                
                console.log('[OfflineDownload] Offline status check complete');
            }

            /**
             * Handle soundscape selection
             * @param {string} id - Soundscape ID
             * @private
             */
            _selectSoundscape(id) {
                console.log(`[SoundscapePicker] Selected: ${id}`);
                this._debugLog(`[picker] 🎵 Selecting soundscape: ${id}`, 'info');

                // Store selection for map_player.html or map_editor_v2.html
                localStorage.setItem('selected_soundscape_id', id);
                this._debugLog(`[picker] 📍 Stored selected_soundscape_id: ${id}`, 'info');

                // Check device type and mode parameter
                const ua = navigator.userAgent;
                const isPhone = /iPhone|iPod|Android.*Mobile|IEMobile|Opera Mini/i.test(ua);
                const isTablet = /iPad|Android(?!.*Mobile)|Tablet|Silk/i.test(ua);
                const isDesktop = !isPhone && !isTablet;

                // Check for explicit mode from tablet (via query parameter)
                const params = new URLSearchParams(window.location.search);
                const modeParam = params.get('mode'); // 'editor' or 'player'

                // Route based on device and mode
                if (isDesktop || modeParam === 'editor') {
                    // Desktop or Tablet Editor: Go to map_editor_v2.html
                    console.log('[SoundscapePicker] Editor mode → map_editor_v2.html');
                    this._debugLog(`[picker] ➡️ Redirecting to map_editor_v2.html...`, 'info');
                    
                    // Unregister Service Worker before navigating to desktop editor
                    if ('serviceWorker' in navigator) {
                        navigator.serviceWorker.getRegistrations().then((registrations) => {
                            for (const registration of registrations) {
                                registration.unregister();
                                console.log('[SoundscapePicker] 📴 Service Worker unregistered before navigating to map_editor_v2');
                            }
                        });
                    }
                    
                    window.location.href = 'map_editor_v2.html';
                } else {
                    // Phone or Tablet Player: Go to map_player.html
                    console.log('[SoundscapePicker] Player mode → map_player.html');
                    this._debugLog(`[picker] ➡️ Redirecting to map_player.html...`, 'info');
                    window.location.href = 'map_player.html';
                }
            }
            
            /**
             * Format date for display
             * @param {string} isoString - ISO 8601 date string
             * @returns {string} Formatted date
             * @private
             */
            _formatDate(isoString) {
                if (!isoString) return 'Unknown';
                const date = new Date(isoString);
                const now = new Date();
                const diffMs = now - date;
                const diffDays = Math.floor(diffMs / (1000 * 60 * 60 * 24));
                
                if (diffDays === 0) {
                    return 'Today';
                } else if (diffDays === 1) {
                    return 'Yesterday';
                } else if (diffDays < 7) {
                    return `${diffDays} days ago`;
                } else {
                    return date.toLocaleDateString();
                }
            }
            
            /**
             * Escape HTML to prevent XSS
             * @param {string} text - Text to escape
             * @returns {string} Escaped text
             * @private
             */
            _escapeHtml(text) {
                const div = document.createElement('div');
                div.textContent = text;
                return div.innerHTML;
            }
            
            /**
             * Setup event listeners
             * @private
             */
            _setupEventListeners() {
                // Logout handler
                document.getElementById('logoutBtn')?.addEventListener('click', () => {
                    this._handleLogout();
                });

                // Back button handler
                document.getElementById('backBtn')?.addEventListener('click', () => {
                    window.location.href = 'index.html';
                });

                // New Soundscape link handler
                document.getElementById('newSoundscapeLink')?.addEventListener('click', (e) => {
                    e.preventDefault();
                    // Navigate to map editor with flag to prime for new soundscape
                    // Unregister Service Worker before navigating to desktop editor
                    if ('serviceWorker' in navigator) {
                        navigator.serviceWorker.getRegistrations().then((registrations) => {
                            for (const registration of registrations) {
                                registration.unregister();
                                console.log('[SoundscapePicker] 📴 Service Worker unregistered before navigating to map_editor_v2');
                            }
                        });
                    }
                    window.location.href = 'map_editor_v2.html?new=true';
                });

                // Debug toggle handler
                document.getElementById('debugToggleBtn')?.addEventListener('click', () => {
                    this._toggleDebugLog();
                });

                // Debug close handler
                document.getElementById('debugCloseBtn')?.addEventListener('click', () => {
                    const debugModal = document.getElementById('debugModal');
                    const toggleBtn = document.getElementById('debugToggleBtn');
                    
                    if (debugModal) debugModal.classList.remove('visible');
                    if (toggleBtn) toggleBtn.classList.remove('hidden');
                });

                // Debug copy handler
                document.getElementById('debugCopyBtn')?.addEventListener('click', () => {
                    const contentEl = document.getElementById('debugModalContent');
                    if (contentEl) {
                        const text = contentEl.innerText;
                        navigator.clipboard.writeText(text).then(() => {
                            this._debugLog('✅ Debug log copied to clipboard', 'info');
                        }).catch(err => {
                            this._debugLog('❌ Failed to copy: ' + err.message, 'error');
                        });
                    }
                });

                // Force SW update handler
                document.getElementById('debugUpdateBtn')?.addEventListener('click', async () => {
                    this._debugLog('🔄 Forcing Service Worker update...', 'info');
                    
                    try {
                        // Unregister all service workers
                        const registrations = await navigator.serviceWorker.getRegistrations();
                        for (const registration of registrations) {
                            await registration.unregister();
                            this._debugLog('✅ SW unregistered: ' + registration.scope, 'success');
                        }

                        // Clear all caches
                        const cacheNames = await caches.keys();
                        for (const cacheName of cacheNames) {
                            await caches.delete(cacheName);
                            this._debugLog('🗑️ Cache deleted: ' + cacheName, 'warning');
                        }

                        this._showToast('🔄 Clearing cache and reloading...', 'info');
                        this._debugLog('💡 Reloading page...', 'info');
                        
                        setTimeout(() => {
                            window.location.reload(true);
                        }, 1500);

                    } catch (error) {
                        this._debugLog('❌ Failed to clear SW: ' + error.message, 'error');
                        this._showToast('❌ Clear failed - try manually clearing browser data', 'error');
                    }
                });
            }
            
            /**
             * Toggle debug log visibility
             * @private
             */
            _toggleDebugLog() {
                const debugModal = document.getElementById('debugModal');
                const toggleBtn = document.getElementById('debugToggleBtn');
                
                if (debugModal) {
                    debugModal.classList.toggle('visible');
                }
                
                if (toggleBtn) {
                    toggleBtn.classList.toggle('hidden');
                }
                
                console.log('[SoundscapePicker] Debug log toggled');
            }

            /**
             * Add line to debug log
             * @param {string} message
             * @param {'info' | 'warn' | 'error' | 'debug'} type
             * @private
             */
            _debugLog(message, type = 'info') {
                const contentEl = document.getElementById('debugModalContent');
                if (!contentEl) return;

                const line = document.createElement('span');
                line.className = `debug-line ${type}`;
                line.textContent = message;
                contentEl.appendChild(line);
                
                // Auto-scroll to bottom
                contentEl.scrollTop = contentEl.scrollHeight;
            }

            /**
             * Handle logout
             * @private
             */
            _handleLogout() {
                if (!confirm('Are you sure you want to logout?')) {
                    return;
                }

                // Clear tokens and selection
                localStorage.removeItem('audio_ar_token');
                localStorage.removeItem('selected_soundscape_id');

                console.log('[SoundscapePicker] Logged out');

                // Redirect to login
                window.location.href = 'index.html';
            }
        }
        
        // Initialize app
        const app = new SoundscapePickerApp();
        window.app = app; // Expose globally for error handler
        
        if (document.readyState === 'loading') {
            document.addEventListener('DOMContentLoaded', () => app.init());
        } else {
            app.init();
        }

        console.log('[soundscape_picker.js] SoundscapePickerApp loaded');
    </script>
</body>
</html>
