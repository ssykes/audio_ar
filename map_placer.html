<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Map Placer - Sound Waypoint Editor</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: #1a1a2e; color: #fff; height: 100vh; overflow: hidden; }
        #app { display: flex; height: 100vh; }
        #sidebar { width: 350px; background: rgba(0,0,0,0.3); padding: 20px; overflow-y: auto; border-right: 1px solid rgba(255,255,255,0.1); display: flex; flex-direction: column; }
        #sidebar-header { flex-shrink: 0; }
        #waypointList { flex: 0 0 auto; max-height: 200px; overflow-y: auto; margin-top: 10px; }
        #debugConsole { 
            flex: 1; 
            min-height: 0;
            margin-top: 15px;
            background: #0d0d1a;
            border: 1px solid #333;
            border-radius: 8px;
            padding: 10px;
            font-family: 'Consolas', 'Courier New', monospace;
            font-size: 11px;
            color: #00ff88;
            overflow-y: auto;
            white-space: pre-wrap;
            word-break: break-all;
        }
        #copyLogsBtn {
            margin-top: 8px;
            padding: 8px;
            background: rgba(0,255,0,0.2);
            color: #00ff88;
            border: 1px solid #00ff88;
            border-radius: 6px;
            cursor: pointer;
            font-size: 0.85em;
            width: 100%;
        }
        #copyLogsBtn:hover {
            background: rgba(0,255,0,0.3);
        }
        #map { flex: 1; height: 100%; }
        h1 { font-size: 1.5em; margin-bottom: 10px; color: #00d9ff; }
        .subtitle { color: #888; font-size: 0.9em; margin-bottom: 20px; }
        .btn { display: block; width: 100%; padding: 12px; margin: 8px 0; background: #4a4a6a; color: #fff; border: none; border-radius: 8px; cursor: pointer; font-size: 1em; transition: background 0.3s; }
        .btn:hover { background: #5a5a7a; }
        .btn-primary { background: linear-gradient(135deg, #667eea, #764ba2); }
        .btn-primary:hover { opacity: 0.9; }
        .btn-danger { background: #e94560; }
        .btn-danger:hover { background: #ff6b6b; }
        .btn-success { background: #00b894; }
        .btn-success:hover { background: #00cec9; }
        .btn-warning { background: #f39c12; }
        .btn-warning:hover { background: #e67e22; }
        .sim-panel {
            background: rgba(0, 255, 136, 0.1);
            border: 1px solid #00ff88;
            border-radius: 8px;
            padding: 12px;
            margin-top: 10px;
            font-size: 0.85em;
        }
        .sim-panel h3 {
            color: #00ff88;
            margin-bottom: 8px;
            font-size: 1em;
        }
        .sim-panel .sim-stat {
            display: flex;
            justify-content: space-between;
            margin: 4px 0;
            color: #ccc;
        }
        .sim-panel .sim-value {
            color: #00d9ff;
            font-weight: bold;
        }
        .version { font-size: 0.7em; color: #666; }
        .status-bar {
            padding: 10px;
            background: rgba(0,0,0,0.3);
            border-top: 1px solid rgba(255,255,255,0.1);
            font-size: 0.85em;
            flex-shrink: 0;
        }
        .status-bar .status-item {
            display: flex;
            justify-content: space-between;
            margin: 4px 0;
            color: #aaa;
        }
        .status-bar .status-value {
            color: #00d9ff;
            font-weight: bold;
        }
        .status-bar.gps-locked .status-value {
            color: #00ff88;
        }
        .debug-info {
            font-size: 0.75em;
            color: #666;
            margin-top: 8px;
            padding: 8px;
            background: rgba(0,0,0,0.2);
            border-radius: 6px;
        }
        .debug-info a {
            color: #00d9ff;
        }
    </style>
</head>
<body>
    <div id="app">
        <div id="sidebar">
            <div id="sidebar-header">
                <h1>🗺️ Map Placer <span class="version">v3.1</span></h1>
                <p class="subtitle">Place sounds on the map</p>
                
                <!-- SoundScape Management -->
                <div id="soundscapeSelector" style="margin: 10px 0;">
                    <label style="font-size: 0.85em; color: #888;">🎼 SoundScape:</label>
                    <select id="soundscapeSelect" style="width: 100%; padding: 8px; background: rgba(0,0,0,0.3); color: #fff; border: 1px solid #444; border-radius: 6px; margin-top: 4px;">
                        <option value="default">Default Soundscape</option>
                    </select>
                    <div style="display: flex; gap: 5px; margin-top: 5px;">
                        <button id="newSoundscapeBtn" class="btn" style="flex: 1; padding: 6px; font-size: 0.85em;">+ New</button>
                        <button id="editSoundscapeBtn" class="btn" style="flex: 1; padding: 6px; font-size: 0.85em;">✏️ Edit</button>
                        <button id="deleteSoundscapeBtn" class="btn btn-danger" style="flex: 1; padding: 6px; font-size: 0.85em;">🗑️</button>
                    </div>
                </div>
                
                <button id="addWaypointBtn" class="btn btn-primary">+ Add Sound</button>
                <button id="startBtn" class="btn btn-primary">▶️ Start</button>
                <button id="simulateBtn" class="btn btn-warning">🎮 Simulate</button>
                <div style="display: flex; gap: 5px;">
                    <button id="exportBtn" class="btn" style="flex: 1;">📦 Export</button>
                    <button id="importBtn" class="btn" style="flex: 1;">📥 Import</button>
                </div>
                <button id="clearAllBtn" class="btn btn-danger">🗑️ Clear All</button>
            </div>
            <div id="waypointList"></div>

            <div id="simPanel" class="sim-panel" style="display: none;">
                <h3>🎮 Simulation Mode</h3>
                <div class="sim-stat">
                    <span>📍 Distance:</span>
                    <span class="sim-value" id="simDistance">--</span>
                </div>
                <div class="sim-stat">
                    <span>🧭 Bearing:</span>
                    <span class="sim-value" id="simBearing">--</span>
                </div>
                <div class="sim-stat">
                    <span>🔊 Volume:</span>
                    <span class="sim-value" id="simVolume">--</span>
                </div>
                <div style="margin-top: 8px; font-size: 0.9em; color: #888;">
                    💡 Drag the avatar to preview
                </div>
            </div>

            <div id="debugConsole">Ready - tap Start to begin...</div>
            <button id="copyLogsBtn">📋 Copy Logs to Clipboard</button>
            
            <div class="debug-info">
                📚 Using <a href="https://developer.mozilla.org/en-US/docs/Web/API/Web_Audio_API" target="_blank">Web Audio API</a> with HRTF panning
            </div>
            
            <div class="status-bar" id="statusBar">
                <div class="status-item">
                    <span>📍 GPS:</span>
                    <span class="status-value" id="gpsStatus">--</span>
                </div>
                <div class="status-item">
                    <span>🧭 Heading:</span>
                    <span class="status-value" id="headingStatus">--</span>
                </div>
                <div class="status-item">
                    <span>🔊 Sounds:</span>
                    <span class="status-value" id="soundsStatus">0</span>
                </div>
            </div>
        </div>
        <div id="map"></div>
    </div>
    
    <!-- Hidden file input for import -->
    <input type="file" id="importFileInput" accept=".json,application/json" style="display: none;">

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="soundscape.js?v=20260313133912"></script>
    <script src="spatial_audio.js?v=20260313133912"></script>
    <script src="spatial_audio_app.js?v=20260313133912"></script>
    <script src="wake_lock_helper.js?v=20260313133912?v=20260313133000"></script>
    <script src="map_placer.js?v=20260313133912?v=20260313133000"></script>
</body>
</html>
