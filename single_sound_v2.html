<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="theme-color" content="#1a1a2e">
    <meta name="description" content="Single GPS sound source test">
    <title>Single Sound Test</title>
    <link rel="manifest" href="manifest.json">
    <link rel="icon" type="image/svg+xml" href="icon-192.svg">
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
            color: #fff;
            min-height: 100vh;
            padding: 20px;
        }
        .container { max-width: 600px; margin: 0 auto; }
        h1 { font-size: 2em; margin-bottom: 10px; text-align: center; }
        .subtitle { text-align: center; color: #888; margin-bottom: 30px; }
        #status {
            background: rgba(255,255,255,0.1);
            padding: 20px; border-radius: 12px;
            margin-bottom: 20px; text-align: center; font-size: 1.1em;
        }
        #status.ready { background: rgba(0,255,0,0.2); border: 2px solid #0f0; }
        #status.error { background: rgba(255,0,0,0.2); border: 2px solid #f00; }
        .sound-info {
            background: rgba(255,255,255,0.05); padding: 20px;
            border-radius: 12px; text-align: center; border: 2px solid transparent;
            margin-bottom: 20px;
        }
        .sound-info.active {
            background: rgba(0,255,0,0.15); border-color: #0f0;
        }
        .sound-icon { font-size: 3em; margin-bottom: 10px; }
        .sound-distance { font-size: 1.5em; color: #00d9ff; margin: 10px 0; }
        .sound-bearing { font-size: 1.2em; color: #aaa; }
        #startBtn {
            width: 100%; padding: 20px; font-size: 1.3em; font-weight: bold;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: #fff; border: none; border-radius: 12px; cursor: pointer;
        }
        #startBtn:disabled { background: #444; cursor: not-allowed; }
        #startBtn.enable-sound { 
            background: linear-gradient(135deg, #00b894 0%, #00cec9 100%);
            animation: pulse 2s infinite;
        }
        @keyframes pulse {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.02); }
        }
        .controls { display: flex; gap: 10px; margin-top: 20px; }
        .controls button {
            flex: 1; padding: 12px; background: rgba(255,255,255,0.1);
            color: #fff; border: 1px solid rgba(255,255,255,0.2);
            border-radius: 8px; cursor: pointer;
        }
        .controls button:hover { background: rgba(255,255,255,0.2); }
        .config-section {
            display: none; margin-top: 15px; padding: 15px;
            background: rgba(255,255,255,0.1); border-radius: 12px;
        }
        .config-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
        .config-grid label { font-size: 0.85em; color: #aaa; display: block; margin-bottom: 5px; }
        .config-grid input, .config-grid select {
            width: 100%; padding: 8px; border-radius: 6px;
            border: 1px solid #444; background: #222; color: #fff;
        }
        .config-section h4 { margin-bottom: 10px; }
        .apply-btn {
            margin-top: 10px; width: 100%; padding: 10px;
            background: #667eea; color: #fff; border: none;
            border-radius: 6px; cursor: pointer;
        }
        #debugConsole {
            margin-top: 20px; padding: 15px;
            background: rgba(0,0,0,0.8); border: 1px solid #444;
            font-family: monospace; font-size: 0.75em; color: #0f0;
            white-space: pre-wrap; max-height: 400px; overflow-y: auto;
        }
        #copyLogsBtn {
            margin-top: 10px; padding: 10px 20px;
            background: rgba(0,255,0,0.2); color: #0f0;
            border: 1px solid #0f0; border-radius: 6px;
            cursor: pointer; font-size: 0.9em;
        }
        #copyLogsBtn:hover {
            background: rgba(0,255,0,0.3);
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🔊 Single Sound Test <span style="font-size:0.5em; color:#666;">v2.122</span></h1>
        <p class="subtitle">Clean architecture with SpatialAudioApp</p>

        <div id="status">Tap "Start" to begin</div>

        <div class="sound-info" id="sound1">
            <div class="sound-icon">🔔</div>
            <div class="sound-distance" id="dist1">-- m</div>
            <div class="sound-bearing" id="bearing1">--°</div>
            <div style="margin-top: 10px; font-size: 0.85em; color: #aaa;" id="gpsStatus">⏳ Waiting for GPS...</div>
        </div>

        <button id="startBtn">Start</button>

        <div class="controls">
            <button id="settingsBtn">⚙️ Settings</button>
            <button id="volumeBtn">🔊 Volume</button>
            <button id="testBtn">🔍 Test Sound</button>
        </div>

        <div id="settingsSection" class="config-section">
            <h4>⚙️ Sound Configuration</h4>
            <div class="config-grid">
                <div>
                    <label>Distance (m)</label>
                    <input type="number" id="distanceInput" value="15" min="1" max="100">
                </div>
                <div>
                    <label>Direction</label>
                    <select id="directionInput">
                        <option value="0">North (0°)</option>
                        <option value="90">East (90°)</option>
                        <option value="180">South (180°)</option>
                        <option value="270">West (270°)</option>
                    </select>
                </div>
                <div>
                    <label>Activation Radius (m)</label>
                    <input type="number" id="radiusInput" value="30" min="5" max="100">
                </div>
                <div>
                    <label>Sound File</label>
                    <input type="text" id="soundInput" value="/sounds/BoxingBell.mp3">
                </div>
            </div>
            <button id="applySettingsBtn" class="apply-btn">Apply & Restart</button>
        </div>

        <div id="volumeSection" class="config-section">
            <h4>🔊 Volume</h4>
            <div style="display: flex; align-items: center; gap: 10px;">
                <span>🔈</span>
                <input type="range" id="volumeSlider" min="0" max="100" value="80" style="flex: 1;">
                <span id="volumeValue">80%</span>
                <span>🔊</span>
            </div>
        </div>

        <div id="debugConsole">Ready...</div>
        <button id="copyLogsBtn" onclick="copyLogs()">📋 Copy Logs to Clipboard</button>
    </div>

    <!-- Load debug logger first, then audio libraries -->
    <script src="debug_logger.js?v=20260315142440"></script>
    <script src="spatial_audio.js?v=20260315142440"></script>
    <script src="spatial_audio_app.js?v=20260315142440"></script>
    <script>
        // Initialize debug logger to capture GPS logs
        DebugLogger.init('debugConsole', 50);
        
        // Service Worker temporarily disabled for testing
        // if ('serviceWorker' in navigator) {
        if (false) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('/service-worker.js')
                    .then((reg) => console.log('✅ Service Worker registered'))
                    .catch((err) => console.error('❌ SW registration failed:', err));
            });
        }

        document.addEventListener('DOMContentLoaded', () => {
            // === UI STATE ===
            let app = null;
            let soundConfig = {
                distance: 15,
                direction: 0,
                activationRadius: 30,
                soundUrl: '/sounds/BoxingBell.mp3',
                volume: 0.8,
                loop: true
            };
            let wakeLock = null;  // Keep screen on
            // TODO: Move to spatial_audio_app.js - app.setCompassThrottle(ms)
            let lastCompassUpdate = 0;  // Throttle compass updates
            const COMPASS_THROTTLE_MS = 100;  // Max 10 updates/sec
            let needsAudioEnable = false;  // Track if second tap is needed (iOS DuckDuckGo)

            // TODO: Move to spatial_audio_app.js - app.enableWakeLock()
            // Request wake lock to prevent screen sleep
            async function requestWakeLock() {
                try {
                    if ('wakeLock' in navigator) {
                        wakeLock = await navigator.wakeLock.request('screen');
                        debugLog('💡 Screen wake lock enabled');

                        wakeLock.addEventListener('release', () => {
                            debugLog('💡 Wake lock released');
                            // Don't auto-retry - wake lock needs user gesture to re-acquire
                            // It will be re-requested on next user interaction
                        });
                    } else {
                        debugLog('⚠️ Wake Lock API not supported - screen may sleep');
                    }
                } catch (err) {
                    // Wake lock often fails when called outside user gesture
                    debugLog(`⚠️ Wake lock failed: ${err.message}`);
                    // Don't retry - needs user gesture
                }
            }

            // TODO: Move to spatial_audio_app.js - app.disableWakeLock()
            // Release wake lock
            async function releaseWakeLock() {
                if (wakeLock) {
                    await wakeLock.release();
                    wakeLock = null;
                }
            }

            // TODO: Move to spatial_audio_app.js - app.monitorAudioState()
            // Monitor audio state and resume if suspended (prevents sleep interruption)
            let audioMonitorInterval = null;
            function monitorAudioState() {
                if (audioMonitorInterval) clearInterval(audioMonitorInterval);

                audioMonitorInterval = setInterval(() => {
                    if (app && app.isRunning && app.engine) {
                        const state = app.engine.getState();
                        if (state === 'suspended') {
                            debugLog('⏸ Audio suspended (sleep?) - resuming...');
                            app.engine.resume().then(() => {
                                debugLog('✅ Audio auto-resumed');
                            }).catch(err => {
                                debugLog(`⚠️ Auto-resume failed: ${err.message}`);
                            });
                        }
                    }
                }, 2000);  // Check every 2 seconds
            }

            // === ELEMENTS ===
            const statusEl = document.getElementById('status');
            const startBtn = document.getElementById('startBtn');
            const soundEl = document.getElementById('sound1');
            const debugConsole = document.getElementById('debugConsole');

            function debugLog(msg) {
                const time = new Date().toLocaleTimeString();
                debugConsole.textContent = `[${time}] ${msg}\n` + debugConsole.textContent;
                const lines = debugConsole.textContent.split('\n');
                if (lines.length > 50) debugConsole.textContent = lines.slice(0, 50).join('\n');
            }

            // Copy logs to clipboard
            window.copyLogs = function() {
                const text = debugConsole.textContent;
                navigator.clipboard.writeText(text).then(() => {
                    const btn = document.getElementById('copyLogsBtn');
                    const originalText = btn.textContent;
                    btn.textContent = '✅ Copied!';
                    setTimeout(() => {
                        btn.textContent = originalText;
                    }, 2000);
                }).catch(err => {
                    alert('Failed to copy: ' + err);
                });
            };

            debugLog('📄 Single Sound Test v2.6 initialized');

            // TODO: Move to spatial_audio_app.js - app.autoResumeAudio()
            // Resume audio when page becomes visible (after phone wakes up)
            document.addEventListener('visibilitychange', async () => {
                if (document.visibilityState === 'visible' && app && app.isRunning && app.engine) {
                    debugLog('👁 Page visible - checking audio...');

                    const state = app.engine.getState();
                    debugLog(`🔊 Audio state: ${state}`);

                    if (state === 'suspended') {
                        debugLog('⏸ Audio suspended - resuming...');
                        try {
                            await app.engine.resume();
                            debugLog('✅ Audio resumed');

                            // Also resume any sounds that may have stopped
                            if (app.sounds) {
                                for (const sound of app.sounds) {
                                    if (sound.sourceNode && !sound.isPlaying) {
                                        debugLog(`🔊 Resuming sound: ${sound.id}`);
                                        sound.sourceNode.start();
                                        sound.isPlaying = true;
                                    }
                                }
                            }
                        } catch (err) {
                            debugLog(`⚠️ Resume failed: ${err.message}`);
                        }
                    } else if (state === 'running') {
                        debugLog('✅ Audio already running');

                        // Verify sounds are still playing
                        if (app.sounds) {
                            for (const sound of app.sounds) {
                                if (sound.sourceNode && !sound.isPlaying) {
                                    debugLog(`🔊 Restarting sound: ${sound.id}`);
                                    sound.sourceNode.start();
                                    sound.isPlaying = true;
                                }
                            }
                        }
                    }
                }
            });

            // === START/STOP ===
            startBtn.addEventListener('click', async () => {
                // Log immediately to confirm click handler is firing
                console.log('[CLICK] Start button clicked!');
                debugLog('👆 START BUTTON CLICKED');
                
                // Check if we just need to enable audio (second tap on iOS DuckDuckGo)
                if (needsAudioEnable && app && app.engine) {
                    debugLog('🔊 Enabling audio context...');
                    try {
                        await app.engine.resume();
                        const state = app.engine.getState();
                        debugLog(`✅ Audio context state: ${state}`);

                        if (state === 'running') {
                            needsAudioEnable = false;
                            startBtn.textContent = 'Stop';
                            startBtn.className = '';
                            statusEl.textContent = '✅ Audio enabled! Walk toward the sound';
                            debugLog('✅ Audio enabled - sound should now work!');
                        }
                    } catch (err) {
                        debugLog(`❌ Audio enable failed: ${err.message}`);
                    }
                    return;
                }
                
                if (app && app.isRunning) {
                    // Stop
                    releaseWakeLock();
                    if (audioMonitorInterval) {
                        clearInterval(audioMonitorInterval);
                        audioMonitorInterval = null;
                    }
                    app.stop();
                    app = null;
                    startBtn.textContent = 'Start';
                    statusEl.textContent = 'Tap "Start" to begin';
                    statusEl.className = '';
                    soundEl.classList.remove('active');
                    debugLog('⏹ Stopped');
                } else {
                    // Start
                    startBtn.disabled = true;
                    startBtn.textContent = 'Starting...';
                    statusEl.textContent = 'Starting...';

                    try {
                        // =====================================================================
                        // ⚠️ CRITICAL: iOS PERMISSION ORDER MATTERS! ⚠️
                        // =====================================================================
                        // iOS requires certain permissions to be requested in a SYNCHRONOUS
                        // user gesture context. This means:
                        //
                        // 1. NO `await` calls before requesting the permission
                        // 2. NO async/await between the click and the permission request
                        // 3. The permission request must be DIRECTLY in the click handler
                        //
                        // Why? iOS tracks "user gesture context" - a flag that gets set when
                        // the user clicks/taps. This flag is CLEARED when:
                        //   - An `await` yields control back to the event loop
                        //   - A setTimeout/setInterval callback runs
                        //   - A Promise resolution handler runs
                        //
                        // If the gesture context is lost, iOS will silently deny permissions
                        // without showing the permission dialog. This is especially strict in:
                        //   - iOS Safari (all versions)
                        //   - iOS DuckDuckGo (even stricter than Safari)
                        //   - iOS Chrome (uses WebKit, same restrictions)
                        //
                        // Order of operations in this click handler:
                        //   1. Compass (DeviceOrientation) - MUST be first, before any await
                        //   2. Wake Lock - must be in user gesture
                        //   3. GPS (Geolocation) - must be before other awaits
                        //   4. Audio (AudioContext) - can be after awaits, but benefits from gesture
                        //
                        // See: https://developer.apple.com/documentation/webkit/requesting_device_orientation_permission
                        // See: https://webkit.org/blog/10308/automation-permission-issue-for-webdriver-in-safari-13/
                        // =====================================================================

                        // ---------------------------------------------------------------------
                        // STEP 1: Request compass permission (BEFORE ANY AWAIT)
                        // ---------------------------------------------------------------------
                        // iOS 13+ requires DeviceOrientationEvent.requestPermission() to be
                        // called synchronously in a user gesture handler. The call itself is
                        // synchronous, but returns a Promise that resolves asynchronously.
                        //
                        // IMPORTANT: We do NOT await this promise! The callback will be called
                        // when permission is granted. Awaiting would lose the gesture context
                        // for subsequent operations.
                        // ---------------------------------------------------------------------
                        debugLog('🧭 Requesting compass permission (immediate, before any await)...');

                        if (typeof DeviceOrientationHelper !== 'undefined') {
                            debugLog(`🧭 Helper available: ${DeviceOrientationHelper.isAvailable}, permissionRequired: ${DeviceOrientationHelper.isPermissionRequired}`);

                            // Call start() - it calls requestPermission() synchronously
                            // The permission dialog appears immediately (if needed)
                            DeviceOrientationHelper.start((heading) => {
                                if (!app || !app.listener || !app.isRunning) return;

                                // Throttle: Skip if too soon (max 10 updates/sec)
                                const now = Date.now();
                                if (now - lastCompassUpdate < COMPASS_THROTTLE_MS) return;
                                lastCompassUpdate = now;

                                // Update listener heading
                                const oldHeading = app.listener.heading;
                                app.listener.setHeading(heading);

                                // Only update if heading changed significantly (> 2°)
                                const headingChange = Math.abs(heading - oldHeading);
                                if (headingChange < 2 && Math.random() > 0.01) return;

                                // Log significant changes
                                if (headingChange > 5) {
                                    console.log(`[Compass] ${oldHeading.toFixed(0)}° → ${heading.toFixed(0)}° (Δ${headingChange.toFixed(0)}°)`);
                                } else {
                                    // Occasional heartbeat to confirm compass is still firing
                                    console.log(`[Compass] ${heading.toFixed(0)}° (GPS: ${app.gpsTracker?.isLocked ? '🔒' : '🔓'})`);
                                }

                                // Update sound positions based on heading change
                                app._updateSoundPositions();
                            });
                            debugLog('🧭 Compass: DeviceOrientationHelper.start() called (will resolve asynchronously)');
                        } else {
                            debugLog('⚠️ DeviceOrientationHelper not loaded!');
                        }

                        // ---------------------------------------------------------------------
                        // STEP 2: Request wake lock (must be in user gesture)
                        // ---------------------------------------------------------------------
                        // Wake lock must also be requested in a user gesture context, but it's
                        // less strict than compass/GPS. Still, we do it early to be safe.
                        // ---------------------------------------------------------------------
                        await requestWakeLock();
                        
                        // === CRITICAL: Request GPS FIRST (before ANY await) ===
                        // iOS requires geolocation permission in synchronous user gesture
                        // DuckDuckGo on iOS is especially strict about this
                        debugLog('📍 Requesting GPS permission (immediate)...');
                        
                        let gpsResolved = false;
                        const initialGPS = await new Promise((resolve) => {
                            // Set timeout to detect if callback never fires
                            const timeoutId = setTimeout(() => {
                                if (!gpsResolved) {
                                    debugLog('⚠️ GPS request TIMEOUT - callbacks never fired');
                                    resolve({ lat: 0, lon: 0 });
                                }
                            }, 12000);
                            
                            navigator.geolocation.getCurrentPosition(
                                (pos) => {
                                    gpsResolved = true;
                                    clearTimeout(timeoutId);
                                    debugLog(`📍 GPS GRANTED ✅ (${pos.coords.latitude.toFixed(4)}, ${pos.coords.longitude.toFixed(4)}, accuracy: ${pos.coords.accuracy.toFixed(1)}m)`);
                                    resolve({ lat: pos.coords.latitude, lon: pos.coords.longitude });
                                },
                                (err) => {
                                    gpsResolved = true;
                                    clearTimeout(timeoutId);
                                    debugLog(`📍 GPS ERROR ❌: ${err.message} (code: ${err.code})`);
                                    resolve({ lat: 0, lon: 0 }); // Fallback
                                },
                                { enableHighAccuracy: true, timeout: 10000, maximumAge: 0 }
                            );
                            debugLog('📍 geolocation.getCurrentPosition called');
                        });
                        
                        debugLog(`📍 GPS resolved: ${initialGPS.lat !== 0 || initialGPS.lon !== 0 ? 'YES' : 'NO (fallback)'}`);

                        // === Now safe to do other async operations ===

                        // Initialize audio (must be in direct click handler for iOS)
                        debugLog('🔊 Initializing audio context...');
                        const tempAudioCtx = new (window.AudioContext || window.webkitAudioContext)();
                        
                        // Add timeout to detect if resume() hangs
                        const resumePromise = tempAudioCtx.resume();
                        const audioTimeout = new Promise((_, reject) => 
                            setTimeout(() => reject(new Error('Audio resume timeout')), 3000)
                        );
                        
                        try {
                            await Promise.race([resumePromise, audioTimeout]);
                            debugLog('✅ Audio context initialized');
                        } catch (audioErr) {
                            debugLog(`⚠️ Audio context issue: ${audioErr.message} (continuing anyway)`);
                        }
                        
                        tempAudioCtx.close();  // Close immediately, just to satisfy iOS gesture requirement

                        // Request wake lock to prevent screen sleep
                        debugLog('🔒 Requesting wake lock...');
                        await requestWakeLock();
                        debugLog('✅ Wake lock done');

                        // Compass was already requested at the start of the click handler (before any await)
                        // Now continue with creating the SpatialAudioApp

                        // Calculate sound position RELATIVE to listener
                        // SpatialAudioApp will handle GPS internally
                        const soundData = {
                            id: 'bell1',
                            url: soundConfig.soundUrl,
                            distance: soundConfig.distance,  // meters from listener
                            direction: soundConfig.direction, // degrees (0=North)
                            activationRadius: soundConfig.activationRadius,
                            volume: soundConfig.volume,
                            loop: soundConfig.loop  // Use config setting
                        };

                        // Create app - it will handle GPS internally
                        // Pass initialPosition to avoid iOS permission race condition
                        app = new SpatialAudioApp([soundData], {
                            gpsSmoothing: true,
                            autoLock: true,
                            reverbEnabled: true,  // ENABLED - reverb working!
                            initialPosition: initialGPS  // Pre-fetched GPS position
                        });

                        // Set up callbacks (UI responds to engine events)
                        // Old code: app.onPositionUpdate = (data) => { updateDisplay(data); };
                        app.onPositionUpdate = () => {
                            // New: use app methods to query distance/bearing directly
                            updateDisplay();
                        };

                        app.onStateChange = (state) => {
                            console.log('[UI] State changed to:', state);
                            debugLog(`📊 State: ${state}`);
                            if (state === 'running') {
                                // Check if audio actually works by testing context state
                                const audioWorks = app.engine && app.engine.getState() === 'running';

                                if (!audioWorks) {
                                    // Audio context didn't resume - needs second tap (iOS DuckDuckGo)
                                    needsAudioEnable = true;
                                    startBtn.disabled = false;
                                    startBtn.textContent = '👆 Tap to Enable Sound';
                                    startBtn.className = 'enable-sound';
                                    statusEl.textContent = '⚠️ Tap button to enable audio';
                                    statusEl.className = 'ready';
                                    debugLog('⚠️ Audio context not running - needs second tap');
                                } else {
                                    // Audio is working normally (Safari, most browsers)
                                    needsAudioEnable = false;
                                    startBtn.disabled = false;
                                    startBtn.textContent = 'Stop';
                                    startBtn.className = '';
                                    statusEl.textContent = '✅ Ready! Walk toward the sound';
                                    statusEl.className = 'ready';
                                    
                                    // Monitor audio state periodically to catch suspensions
                                    monitorAudioState();
                                }
                            } else if (state === 'starting') {
                                startBtn.disabled = true;
                                startBtn.textContent = 'Starting...';
                                startBtn.className = '';
                                statusEl.textContent = 'Starting...';
                            } else if (state === 'error') {
                                startBtn.disabled = false;
                                startBtn.textContent = 'Start Over';
                                startBtn.className = '';
                            } else if (state === 'stopped') {
                                startBtn.disabled = false;
                                startBtn.textContent = 'Start';
                                startBtn.className = '';
                                statusEl.textContent = 'Tap "Start" to begin';
                            }
                        };

                        app.onError = (error) => {
                            debugLog(`❌ Error: ${error.message}`);
                            statusEl.textContent = '❌ ' + error.message;
                            statusEl.className = 'error';
                        };

                        // Start the experience
                        debugLog('🚀 Calling app.start()...');
                        await app.start();
                        debugLog('✅ app.start() completed');

                    } catch (error) {
                        debugLog(`❌ Error: ${error.message}`);
                        statusEl.textContent = '❌ ' + error.message;
                        statusEl.className = 'error';
                        startBtn.disabled = false;
                        startBtn.textContent = 'Try Again';
                    }
                }
            });

            // === DISPLAY UPDATE ===
            function updateDisplay() {
                // Use new app API methods instead of processing callback data
                const distance = app.getSoundDistance('bell1');
                const bearing = app.getSoundBearing('bell1');
                const relativeBearing = app.getSoundRelativeBearing('bell1');

                // Old code (replaced by app methods above):
                /*
                if (!data || !data.listener || !data.sounds || data.sounds.length === 0) return;

                const sound = data.sounds[0];

                document.getElementById('dist1').textContent = sound.distance.toFixed(1) + ' m';
                document.getElementById('bearing1').textContent =
                    `${sound.bearing.toFixed(0)}° (relative: ${GPSUtils.relativeBearing(sound.bearing, data.listener.heading).toFixed(0)}°)`;
                */

                // Update display with values from app
                if (distance !== null) {
                    document.getElementById('dist1').textContent = distance.toFixed(1) + ' m';
                }
                if (bearing !== null && relativeBearing !== null) {
                    document.getElementById('bearing1').textContent =
                        `${bearing.toFixed(0)}° (relative: ${relativeBearing.toFixed(0)}°)`;
                }

                // Update GPS status
                const gpsStatusEl = document.getElementById('gpsStatus');
                if (app && app.gpsTracker && app.gpsTracker.isLocked) {
                    gpsStatusEl.textContent = '🔒 GPS LOCKED (stationary)';
                    gpsStatusEl.style.color = '#00ff88';
                } else {
                    gpsStatusEl.textContent = '🔓 GPS LIVE (moving)';
                    gpsStatusEl.style.color = '#aaa';
                }

                // Update sound visual (use queried distance instead of data.sounds[0].distance)
                // Old code: if (sound.distance < soundConfig.activationRadius) {
                if (distance !== null && distance < soundConfig.activationRadius) {
                    soundEl.classList.add('active');
                } else {
                    soundEl.classList.remove('active');
                }
            }

            // === BUTTON HANDLERS ===
            
            // Settings toggle
            document.getElementById('settingsBtn').onclick = () => {
                document.getElementById('settingsSection').style.display = 
                    document.getElementById('settingsSection').style.display === 'none' ? 'block' : 'none';
            };

            // Volume toggle
            document.getElementById('volumeBtn').onclick = () => {
                document.getElementById('volumeSection').style.display = 
                    document.getElementById('volumeSection').style.display === 'none' ? 'block' : 'none';
            };

            // Apply settings
            document.getElementById('applySettingsBtn').onclick = () => {
                soundConfig.distance = parseInt(document.getElementById('distanceInput').value);
                soundConfig.direction = parseInt(document.getElementById('directionInput').value);
                soundConfig.activationRadius = parseInt(document.getElementById('radiusInput').value);
                soundConfig.soundUrl = document.getElementById('soundInput').value;
                
                debugLog(`⚙️ Config updated: ${soundConfig.distance}m @ ${soundConfig.direction}°`);
                document.getElementById('settingsSection').style.display = 'none';
                
                // Restart if running
                if (app && app.isRunning) {
                    app.stop();
                    setTimeout(() => startBtn.click(), 500);
                }
            };

            // Volume slider
            document.getElementById('volumeSlider').addEventListener('input', (e) => {
                soundConfig.volume = e.target.value / 100;
                document.getElementById('volumeValue').textContent = e.target.value + '%';
                
                // Request volume change via app API
                if (app) {
                    app.setVolume('bell1', soundConfig.volume);
                }
            });

            // Test sound
            document.getElementById('testBtn').onclick = async () => {
                if (!app || !app.isRunning) {
                    debugLog('⚠️ Start first!');
                    return;
                }
                
                debugLog(`🔊 Test: Volume set to ${(soundConfig.volume * 100)}%`);
                app.setVolume('bell1', soundConfig.volume);
            };
        });
    </script>
</body>
</html>
