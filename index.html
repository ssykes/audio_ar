<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="theme-color" content="#1a1a2e">
    <title>Audio Panning Test v3.3</title>
    <link rel="manifest" href="manifest.json">
    <link rel="icon" type="image/svg+xml" href="icon-192.svg">
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            max-width: 800px;
            margin: 40px auto;
            padding: 20px;
            background: #1a1a2e;
            color: #eee;
        }
        h1 {
            text-align: center;
            color: #00d9ff;
        }
        .controls {
            display: flex;
            justify-content: center;
            gap: 15px;
            margin: 30px 0;
            flex-wrap: wrap;
        }
        #toggleBtn, .panBtn {
            padding: 15px 25px;
            font-size: 16px;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            background: #4a4a6a;
            color: #fff;
            transition: all 0.3s;
        }
        #toggleBtn.active, .panBtn.active {
            background: #e94560;
        }
        #toggleBtn:hover, .panBtn:hover {
            opacity: 0.8;
        }
        .panBtn.active {
            background: #00d9ff;
            color: #000;
        }
        .compass {
            width: 200px;
            height: 200px;
            margin: 30px auto;
            position: relative;
            border: 2px solid #00d9ff;
            border-radius: 50%;
        }
        .compass::before {
            content: '';
            position: absolute;
            top: 50%;
            left: 0;
            width: 100%;
            height: 1px;
            background: #00d9ff;
            transform: translateY(-50%);
        }
        .compass::after {
            content: '';
            position: absolute;
            left: 50%;
            top: 0;
            width: 1px;
            height: 100%;
            background: #00d9ff;
            transform: translateX(-50%);
        }
        .compass-point {
            position: absolute;
            width: 16px;
            height: 16px;
            background: #4a4a6a;
            border-radius: 50%;
            transform: translate(-50%, -50%);
            transition: all 0.1s;
            z-index: 10;
        }
        .compass-point.active {
            background: #00d9ff;
            box-shadow: 0 0 15px #00d9ff;
            width: 20px;
            height: 20px;
        }
        .compass-point span {
            position: absolute;
            font-size: 10px;
            color: #888;
            white-space: nowrap;
        }
        .point-n span { top: -20px; left: 50%; transform: translateX(-50%); }
        .point-ne span { top: 15px; right: -25px; }
        .point-e span { top: 50%; right: -25px; transform: translateY(-50%); }
        .point-se span { bottom: 15px; right: -25px; }
        .point-s span { bottom: -20px; left: 50%; transform: translateX(-50%); }
        .point-sw span { bottom: 15px; left: -25px; }
        .point-w span { top: 50%; left: -25px; transform: translateY(-50%); }
        .point-nw span { top: 15px; left: -25px; }
        #debugConsole {
            background: #0d0d1a;
            border: 1px solid #333;
            border-radius: 8px;
            padding: 15px;
            margin-top: 30px;
            height: 300px;
            overflow-y: auto;
            font-family: 'Consolas', 'Courier New', monospace;
            font-size: 12px;
        }
        .log-entry {
            margin: 3px 0;
            padding: 2px 5px;
            border-radius: 3px;
        }
        .log-info { color: #00d9ff; }
        .log-success { color: #00ff88; }
        .log-error { color: #e94560; }
    </style>
</head>
<body>
    <h1>🎵 Audio Panning Test <span style="font-size:0.5em; color:#666;">v3.72</span></h1>
    
    <div class="controls">
        <button id="toggleBtn">🔄 Start</button>
        <button id="nsBtn" class="panBtn">⬆️ N↔S</button>
        <button id="ewBtn" class="panBtn">➡️ E↔W</button>
    </div>
    
    <div class="compass" id="compass">
        <div class="compass-point point-n" style="top: 0%; left: 50%;"><span>N</span></div>
        <div class="compass-point point-ne" style="top: 15%; left: 85%;"><span>NE</span></div>
        <div class="compass-point point-e" style="top: 50%; left: 100%;"><span>E</span></div>
        <div class="compass-point point-se" style="top: 85%; left: 85%;"><span>SE</span></div>
        <div class="compass-point point-s" style="top: 100%; left: 50%;"><span>S</span></div>
        <div class="compass-point point-sw" style="top: 85%; left: 15%;"><span>SW</span></div>
        <div class="compass-point point-w" style="top: 50%; left: 0%;"><span>W</span></div>
        <div class="compass-point point-nw" style="top: 15%; left: 15%;"><span>NW</span></div>
    </div>
    
    <div id="debugConsole"></div>

    <script src="spatial_audio.js?v=20260312214329"></script>
    <script>
        // Register Service Worker for offline support
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('/service-worker.js')
                    .then((registration) => {
                        console.log('✅ Service Worker registered:', registration.scope);
                    })
                    .catch((error) => {
                        console.error('❌ Service Worker registration failed:', error);
                    });
            });
        }

        // === Application Code using spatial_audio.js v3.0 ===
        
        let engine = null;
        let currentMode = null;
        let animationId = null;
        let visualStartTime = 0;

        // 8 compass points for visual highlighting
        const compassPoints = [
            { name: 'N',  angle: 0,     element: 'point-n' },
            { name: 'NE', angle: 45,    element: 'point-ne' },
            { name: 'E',  angle: 90,    element: 'point-e' },
            { name: 'SE', angle: 135,   element: 'point-se' },
            { name: 'S',  angle: 180,   element: 'point-s' },
            { name: 'SW', angle: 225,   element: 'point-sw' },
            { name: 'W',  angle: 270,   element: 'point-w' },
            { name: 'NW', angle: 315,   element: 'point-nw' }
        ];

        function log(message, type = 'info') {
            const console = document.getElementById('debugConsole');
            const entry = document.createElement('div');
            entry.className = `log-entry log-${type}`;
            const time = new Date().toLocaleTimeString();
            entry.textContent = `[${time}] ${message}`;
            console.appendChild(entry);
            console.scrollTop = console.scrollHeight;
        }

        async function initEngine() {
            if (!engine) {
                engine = new SpatialAudioEngine({
                    keepAlive: true,
                    keepAliveInterval: 3000
                });
                await engine.init();
                engine.enableKeepAlive(3000);
                engine.monitorAudioState(5000);
                log('🔊 Spatial audio engine initialized (v3.0)', 'success');
            }
            await engine.resume();
            log(`📊 Audio state: ${engine.getState()}`, 'info');
            return true;
        }

        function stopAll() {
            currentMode = null;
            
            if (animationId) {
                cancelAnimationFrame(animationId);
                animationId = null;
            }

            if (engine) {
                engine.removeAllSources();
            }

            // Clear all button states
            document.getElementById('toggleBtn').classList.remove('active');
            document.getElementById('nsBtn').classList.remove('active');
            document.getElementById('ewBtn').classList.remove('active');

            // Clear all compass highlights
            document.querySelectorAll('.compass-point').forEach(el => {
                el.classList.remove('active');
            });

            log('⏹ Stopped', 'info');
        }

        function updateCompass(angleDeg) {
            angleDeg = angleDeg % 360;
            if (angleDeg < 0) angleDeg += 360;

            let closest = null;
            let minDiff = 90;

            compassPoints.forEach((point, index) => {
                let diff = Math.abs(angleDeg - point.angle);
                if (diff > 180) diff = 360 - diff;
                if (diff < minDiff) {
                    minDiff = diff;
                    closest = index;
                }
            });

            document.querySelectorAll('.compass-point').forEach(el => {
                el.classList.remove('active');
            });
            if (closest !== null) {
                const el = document.getElementById(compassPoints[closest].element);
                if (el) el.classList.add('active');
            }
        }

        function startPattern(mode) {
            stopAll();

            currentMode = mode;
            visualStartTime = performance.now();

            document.getElementById('toggleBtn').classList.toggle('active', mode === 'circular');
            document.getElementById('nsBtn').classList.toggle('active', mode === 'ns');
            document.getElementById('ewBtn').classList.toggle('active', mode === 'ew');

            const modeNames = { circular: 'circular', ns: 'N↔S', ew: 'E↔W' };
            log(`🎵 Starting ${modeNames[mode]} panning...`, 'success');

            engine.createOscillator('pan1', {
                wave: 'square',
                freq: 440,
                gain: 0.3
            });

            const source = engine.getSource('pan1');
            source.start();

            const t0 = engine.getCurrentTime();
            const points = 128;

            if (mode === 'circular') {
                // Use HRTF panner for circular motion around head
                const duration = 5;
                for (let rot = 0; rot < 10; rot++) {
                    for (let i = 0; i <= points; i++) {
                        const t = t0 + rot * duration + (i / points) * duration;
                        const angleRad = (i / points) * Math.PI * 2;
                        const x = Math.sin(angleRad) * 2;
                        const z = -Math.cos(angleRad) * 2;
                        source.panner.positionX.setValueAtTime(x, t);
                        source.panner.positionZ.setValueAtTime(z, t);
                    }
                }
            } else if (mode === 'ns') {
                // Pre-schedule smooth front-back motion with many points
                const halfDuration = 2.5; // 2.5s front-to-back, 2.5s back-to-front
                for (let cycle = 0; cycle < 5; cycle++) {
                    const base = t0 + cycle * halfDuration * 2;
                    // Front to back
                    for (let i = 0; i <= points; i++) {
                        const t = base + (i / points) * halfDuration;
                        const z = 2 - (i / points) * 4; // +2 (front) to -2 (back)
                        source.panner.positionX.setValueAtTime(0, t);
                        source.panner.positionZ.setValueAtTime(z, t);
                    }
                    // Back to front
                    for (let i = 0; i <= points; i++) {
                        const t = base + halfDuration + (i / points) * halfDuration;
                        const z = -2 + (i / points) * 4; // -2 (back) to +2 (front)
                        source.panner.positionX.setValueAtTime(0, t);
                        source.panner.positionZ.setValueAtTime(z, t);
                    }
                }
            } else if (mode === 'ew') {
                // Use StereoPanner with pre-scheduled smooth left-right motion
                const stereoPanner = engine.ctx.createStereoPanner();
                stereoPanner.connect(engine.masterGain);
                source.gain.disconnect();
                source.gain.connect(stereoPanner);
                
                const halfDuration = 2.5; // 2.5s left-to-right, 2.5s right-to-left
                for (let cycle = 0; cycle < 5; cycle++) {
                    const base = t0 + cycle * halfDuration * 2;
                    // Left to right
                    for (let i = 0; i <= points; i++) {
                        const t = base + (i / points) * halfDuration;
                        const pan = -1 + (i / points) * 2; // -1 (left) to +1 (right)
                        stereoPanner.pan.setValueAtTime(pan, t);
                    }
                    // Right to left
                    for (let i = 0; i <= points; i++) {
                        const t = base + halfDuration + (i / points) * halfDuration;
                        const pan = 1 - (i / points) * 2; // +1 (right) to -1 (left)
                        stereoPanner.pan.setValueAtTime(pan, t);
                    }
                }
            }

            function updateVisual() {
                if (!currentMode) return;
                const elapsed = performance.now() - visualStartTime;

                if (mode === 'circular') {
                    const duration = 5000;
                    const angleDeg = ((elapsed % duration) / duration) * 360;
                    updateCompass(angleDeg);
                } else if (mode === 'ns') {
                    // 10 second full cycle (5s front-to-back, 5s back-to-front)
                    const cycleDuration = 10000;
                    const t = (elapsed % cycleDuration) / cycleDuration;
                    if (t < 0.5) {
                        updateCompass(0); // Front (N)
                    } else {
                        updateCompass(180); // Back (S)
                    }
                } else if (mode === 'ew') {
                    // 10 second full cycle (5s left-to-right, 5s right-to-left)
                    const cycleDuration = 10000;
                    const t = (elapsed % cycleDuration) / cycleDuration;
                    if (t < 0.5) {
                        updateCompass(270); // Left (W)
                    } else {
                        updateCompass(90); // Right (E)
                    }
                }

                animationId = requestAnimationFrame(updateVisual);
            }
        }

        document.getElementById('toggleBtn').addEventListener('click', async () => {
            log('🔘 Circular button clicked', 'info');
            if (currentMode === 'circular') {
                stopAll();
            } else {
                try {
                    const ok = await initEngine();
                    if (ok) {
                        startPattern('circular');
                    }
                } catch (err) {
                    log('❌ Error: ' + err.message, 'error');
                }
            }
        });

        document.getElementById('nsBtn').addEventListener('click', async () => {
            log('🔘 N-S button clicked', 'info');
            if (currentMode === 'ns') {
                stopAll();
            } else {
                try {
                    const ok = await initEngine();
                    if (ok) {
                        startPattern('ns');
                    }
                } catch (err) {
                    log('❌ Error: ' + err.message, 'error');
                }
            }
        });

        document.getElementById('ewBtn').addEventListener('click', async () => {
            log('🔘 E-W button clicked', 'info');
            if (currentMode === 'ew') {
                stopAll();
            } else {
                try {
                    const ok = await initEngine();
                    if (ok) {
                        startPattern('ew');
                    }
                } catch (err) {
                    log('❌ Error: ' + err.message, 'error');
                }
            }
        });

        log('🎵 Audio panning test v3.3 - Smooth back-and-forth panning', 'info');
    </script>
</body>
</html>
