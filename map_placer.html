<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Map Placer - Sound Waypoint Editor</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: #1a1a2e; color: #fff; height: 100vh; overflow: hidden; }
        #app { display: flex; height: 100vh; }
        #sidebar { width: 300px; background: rgba(0,0,0,0.3); padding: 20px; overflow-y: auto; border-right: 1px solid rgba(255,255,255,0.1); }
        #map { flex: 1; height: 100%; }
        h1 { font-size: 1.5em; margin-bottom: 10px; color: #00d9ff; }
        .subtitle { color: #888; font-size: 0.9em; margin-bottom: 20px; }
        .btn { display: block; width: 100%; padding: 12px; margin: 8px 0; background: #4a4a6a; color: #fff; border: none; border-radius: 8px; cursor: pointer; font-size: 1em; transition: background 0.3s; }
        .btn:hover { background: #5a5a7a; }
        .btn-primary { background: linear-gradient(135deg, #667eea, #764ba2); }
        .btn-primary:hover { opacity: 0.9; }
        .btn-danger { background: #e94560; }
        .btn-danger:hover { background: #ff6b6b; }
        #waypointList { margin-top: 20px; }
        .version { font-size: 0.7em; color: #666; }
    </style>
</head>
<body>
    <div id="app">
        <div id="sidebar">
            <h1>🗺️ Map Placer <span class="version">v1.0</span></h1>
            <p class="subtitle">Place sounds on the map</p>
            <button id="addWaypointBtn" class="btn btn-primary">+ Add Sound</button>
            <button id="startBtn" class="btn btn-primary">▶️ Start</button>
            <button id="exportBtn" class="btn">📦 Export Config</button>
            <button id="clearAllBtn" class="btn btn-danger">🗑️ Clear All</button>
            <div id="waypointList"></div>
        </div>
        <div id="map"></div>
    </div>
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="wake_lock_helper.js"></script>
    <script src="map_placer.js"></script>
</body>
</html>
