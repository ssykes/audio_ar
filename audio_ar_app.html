<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="theme-color" content="#1a1a2e">
    <meta name="description" content="Walk through spatial soundscapes placed at GPS coordinates">
    <title>Audio AR - Walkable Sound Experience</title>
    <link rel="manifest" href="manifest.json">
    <link rel="icon" type="image/svg+xml" href="icon-192.svg">
    <link rel="apple-touch-icon" href="icon-192.svg">
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
            color: #fff;
            min-height: 100vh;
            padding: 20px;
        }
        .container { max-width: 600px; margin: 0 auto; }
        h1 { font-size: 2em; margin-bottom: 10px; text-align: center; }
        .subtitle { text-align: center; color: #888; margin-bottom: 30px; }
        #status {
            background: rgba(255,255,255,0.1);
            padding: 20px; border-radius: 12px;
            margin-bottom: 20px; text-align: center; font-size: 1.1em;
        }
        #status.ready { background: rgba(0,255,0,0.2); border: 2px solid #0f0; }
        #status.error { background: rgba(255,0,0,0.2); border: 2px solid #f00; }
        .locations {
            display: grid; grid-template-columns: 1fr; gap: 15px; margin-bottom: 30px;
        }
        .location {
            background: rgba(255,255,255,0.05); padding: 20px;
            border-radius: 12px; text-align: center; border: 2px solid transparent;
            display: flex; align-items: center; justify-content: space-between;
        }
        .location.active {
            background: rgba(0,255,0,0.15); border-color: #0f0;
        }
        .location-info { text-align: left; }
        .location-icon { font-size: 2em; margin-right: 15px; display: inline-block; }
        .location-name { font-size: 1.2em; font-weight: bold; }
        .location-desc { font-size: 0.85em; color: #888; }
        .location-distance { font-size: 1.2em; color: #00d9ff; }
        #startBtn {
            width: 100%; padding: 20px; font-size: 1.3em; font-weight: bold;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: #fff; border: none; border-radius: 12px; cursor: pointer;
        }
        #startBtn:disabled { background: #444; cursor: not-allowed; }
        #configSection {
            display: none; margin-top: 15px; padding: 15px;
            background: rgba(255,255,255,0.1); border-radius: 12px;
        }
        .config-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
        .config-grid input {
            width: 100%; padding: 8px; border-radius: 6px;
            border: 1px solid #444; background: #222; color: #fff;
        }
        #debugConsole {
            margin-top: 20px; padding: 15px;
            background: rgba(0,0,0,0.8); border: 1px solid #444;
            font-family: monospace; font-size: 0.75em; color: #0f0;
            white-space: pre-wrap; max-height: 150px; overflow-y: auto;
        }
        .btn-row { display: flex; gap: 10px; margin-top: 15px; }
        .btn-row button {
            flex: 1; padding: 12px; background: rgba(255,255,255,0.1);
            color: #fff; border: 1px solid rgba(255,255,255,0.2);
            border-radius: 8px; cursor: pointer;
        }
        .btn-row button:hover { background: rgba(255,255,255,0.2); }
    </style>
</head>
<body>
    <div class="container">
        <h1>🎧 Audio AR <span style="font-size:0.5em; color:#666;">v9.0</span></h1>
        <p class="subtitle">Walk between 3 spatial sound locations</p>

        <div id="status">Tap "Start" to begin</div>

        <div class="locations">
            <div class="location" id="loc1">
                <div>
                    <span class="location-icon">🌊</span>
                    <div class="location-info">
                        <div class="location-name">Ocean</div>
                        <div class="location-desc">Low ambient waves</div>
                    </div>
                </div>
                <div class="location-distance" id="dist1">-- m</div>
            </div>
            <div class="location" id="loc2">
                <div>
                    <span class="location-icon">🔔</span>
                    <div class="location-info">
                        <div class="location-name">Alarm</div>
                        <div class="location-desc">Bright alert bell</div>
                    </div>
                </div>
                <div class="location-distance" id="dist2">-- m</div>
            </div>
            <div class="location" id="loc3">
                <div>
                    <span class="location-icon">🎵</span>
                    <div class="location-info">
                        <div class="location-name">Chord</div>
                        <div class="location-desc">Musical harmony</div>
                    </div>
                </div>
                <div class="location-distance" id="dist3">-- m</div>
            </div>
        </div>

        <button id="startBtn">Start Experience</button>

        <div id="configSection">
            <h4 style="margin-bottom:10px;">⚙️ Configuration</h4>
            <div class="config-grid">
                <div>
                    <label style="font-size:0.85em; color:#aaa;">Spacing (m)</label>
                    <input type="number" id="spacingInput" value="15" step="1">
                </div>
                <div>
                    <label style="font-size:0.85em; color:#aaa;">Radius (m)</label>
                    <input type="number" id="radiusInput" value="20" step="1">
                </div>
            </div>
            <button id="applyConfigBtn" style="margin-top:10px; width:100%; padding:10px; background:#667eea; color:#fff; border:none; border-radius:6px;">Apply & Restart</button>
        </div>

        <div class="btn-row">
            <button id="configToggleBtn">⚙️ Settings</button>
        </div>

        <div id="debugConsole">Ready...</div>
    </div>

    <!-- Load spatial_audio.js v4.0 library -->
    <script src="spatial_audio.js?v=4"></script>
    <script>
        // Register Service Worker for offline support
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('/service-worker.js')
                    .then((reg) => console.log('✅ Service Worker registered'))
                    .catch((err) => console.error('❌ SW registration failed:', err));
            });
        }

        document.addEventListener('DOMContentLoaded', () => {
            // === CONFIG ===
            let SPACING = 15;
            let ACTIVATION_RADIUS = 20;

            // === STATE ===
            let engine = null;
            let userLat = null, userLon = null, userHeading = 0;
            let centerLat = null, centerLon = null;
            let locations = [], testMode = false;
            let gpsWatchId = null;

            // === ELEMENTS ===
            const statusEl = document.getElementById('status');
            const startBtn = document.getElementById('startBtn');
            const configSection = document.getElementById('configSection');
            const debugConsole = document.getElementById('debugConsole');

            // === DEBUG LOG ===
            function debugLog(msg) {
                const time = new Date().toLocaleTimeString();
                debugConsole.textContent = `[${time}] ${msg}\n` + debugConsole.textContent;
                const lines = debugConsole.textContent.split('\n');
                if (lines.length > 20) debugConsole.textContent = lines.slice(0, 20).join('\n');
            }

            debugLog('📄 Audio AR v9.0 initialized');
            debugLog('📦 Using spatial_audio.js v4.0');

            if (typeof SpatialAudioEngine === 'undefined') {
                debugLog('❌ spatial_audio.js not loaded!');
                statusEl.textContent = '❌ Library not loaded';
                statusEl.className = 'error';
                return;
            }

            // === GPS ===
            function calculateLocations(lat, lon) {
                const dLat = SPACING / 111000;
                const dLon = SPACING / (111000 * Math.cos(lat * Math.PI / 180));
                return [
                    { id: 1, name: 'Ocean', preset: 'ocean', lat: lat + dLat, lon: lon },
                    { id: 2, name: 'Alarm', preset: 'alarm', lat: lat - dLat/2, lon: lon + dLon },
                    { id: 3, name: 'Chord', preset: 'chord', lat: lat - dLat/2, lon: lon - dLon }
                ];
            }

            // === START BUTTON ===
            startBtn.addEventListener('click', async () => {
                debugLog('▶️ Start clicked');
                startBtn.disabled = true;
                startBtn.textContent = 'Getting GPS...';

                if (!navigator.geolocation) {
                    debugLog('❌ Geolocation not supported!');
                    statusEl.textContent = '❌ Geolocation not supported';
                    statusEl.className = 'error';
                    startBtn.disabled = false;
                    startBtn.textContent = 'Start Over';
                    return;
                }

                debugLog('🌍 Requesting GPS permission...');

                try {
                    const pos = await new Promise((resolve, reject) => {
                        navigator.geolocation.getCurrentPosition(resolve, reject, {
                            enableHighAccuracy: true,
                            timeout: 20000,
                            maximumAge: 0
                        });
                    });

                    userLat = pos.coords.latitude;
                    userLon = pos.coords.longitude;
                    centerLat = userLat;
                    centerLon = userLon;
                    debugLog(`📍 GPS: ${userLat.toFixed(6)}, ${userLon.toFixed(6)}`);

                    locations = calculateLocations(centerLat, centerLon);

                    // Initialize spatial audio engine with v4.0 features
                    engine = new SpatialAudioEngine({
                        keepAlive: true,
                        keepAliveInterval: 3000,
                        onAudioSuspended: () => debugLog('⚠️ Audio suspended, resuming...')
                    });
                    await engine.init();
                    await engine.resume();
                    engine.enableKeepAlive(3000);
                    engine.monitorAudioState(5000);
                    debugLog('🔊 Spatial audio engine initialized');

                    // Create GPS-fixed sound sources using presets
                    locations.forEach(loc => {
                        const source = engine.createPresetSource(`loc${loc.id}`, loc.preset, {
                            lat: loc.lat,
                            lon: loc.lon,
                            gain: 0.4,
                            activationRadius: ACTIVATION_RADIUS
                        });
                        if (source) {
                            source.start();
                            debugLog(`  ✅ Created ${loc.name} (${loc.preset}) at GPS`);
                        }
                    });

                    // GPS tracking
                    gpsWatchId = navigator.geolocation.watchPosition(
                        (p) => {
                            userLat = p.coords.latitude;
                            userLon = p.coords.longitude;
                            userHeading = p.coords.heading || 0;
                            engine.updateAllGpsSources(userLat, userLon, userHeading);
                            updateAudio();
                        },
                        (e) => debugLog('GPS error: ' + e.message),
                        { enableHighAccuracy: true, maximumAge: 1000, timeout: 10000 }
                    );

                    statusEl.textContent = '✅ Ready! Walk to hear sounds';
                    statusEl.className = 'ready';
                    startBtn.textContent = 'Running';
                    debugLog('✅ Started!');

                } catch (err) {
                    debugLog('❌ GPS Error: ' + err.message);
                    let errorMsg = '❌ GPS error';
                    switch(err.code) {
                        case 1: errorMsg = '❌ Location permission denied'; break;
                        case 2: errorMsg = '❌ Location unavailable'; break;
                        case 3: errorMsg = '❌ Location timed out'; break;
                    }
                    statusEl.textContent = errorMsg;
                    statusEl.className = 'error';
                    startBtn.disabled = false;
                    startBtn.textContent = 'Try Again';
                }
            });

            function updateAudio() {
                if (!userLat || !engine) return;
                
                locations.forEach((loc, i) => {
                    const dist = GPSUtils.distance(userLat, userLon, loc.lat, loc.lon);
                    document.getElementById('dist' + (i+1)).textContent = dist.toFixed(1) + ' m';
                    
                    const el = document.getElementById('loc' + (i+1));
                    const source = engine.getSource(`loc${loc.id}`);
                    
                    if (dist < ACTIVATION_RADIUS) {
                        el.classList.add('active');
                        if (source && !testMode) {
                            source.updateGainByDistance(userLat, userLon, 0.4);
                        }
                    } else {
                        el.classList.remove('active');
                        if (source) source.gain.gain.value = 0;
                    }
                });
            }

            // Test mode toggle
            document.getElementById('loc1').addEventListener('dblclick', () => {
                testMode = !testMode;
                statusEl.textContent = testMode ? '🔊 MAX Volume' : '✅ Ready';
                debugLog(testMode ? '🔊 Test mode ON' : '✅ Test mode OFF');
                if (engine) {
                    locations.forEach(loc => {
                        const source = engine.getSource(`loc${loc.id}`);
                        if (source) source.gain.gain.value = testMode ? 0.5 : 0;
                    });
                }
            });

            // Config buttons
            document.getElementById('configToggleBtn').onclick = () => {
                configSection.style.display = configSection.style.display === 'none' ? 'block' : 'none';
            };

            document.getElementById('applyConfigBtn').onclick = () => {
                SPACING = parseInt(document.getElementById('spacingInput').value);
                ACTIVATION_RADIUS = parseInt(document.getElementById('radiusInput').value);
                if (engine) engine.removeAllSources();
                if (centerLat) {
                    locations = calculateLocations(centerLat, centerLon);
                    locations.forEach(loc => {
                        const source = engine.createPresetSource(`loc${loc.id}`, loc.preset, {
                            lat: loc.lat, lon: loc.lon,
                            gain: 0.4, activationRadius: ACTIVATION_RADIUS
                        });
                        if (source) source.start();
                    });
                }
                configSection.style.display = 'none';
                debugLog(`⚙️ Config: Spacing=${SPACING}m, Radius=${ACTIVATION_RADIUS}m`);
            };

            debugLog('✅ Ready to start');
        });
    </script>
</body>
</html>
