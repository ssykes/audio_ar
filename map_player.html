<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="theme-color" content="#1a1a2e">
    <title>Map Player - Spatial Audio AR</title>
    <link rel="manifest" href="manifest.json">
    <link rel="icon" type="image/svg+xml" href="icon-192.svg">
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: #1a1a2e; color: #fff; height: 100vh; overflow: hidden; }
        #app { display: flex; height: 100vh; }
        #sidebar { width: 280px; background: rgba(0,0,0,0.3); padding: 20px; overflow-y: auto; border-right: 1px solid rgba(255,255,255,0.1); display: flex; flex-direction: column; }
        #map { flex: 1; height: 100%; }
        h1 { font-size: 1.5em; margin-bottom: 5px; color: #00d9ff; }
        .subtitle { color: #888; font-size: 0.9em; margin-bottom: 20px; }
        .btn { display: block; width: 100%; padding: 12px; margin: 8px 0; background: #4a4a6a; color: #fff; border: none; border-radius: 8px; cursor: pointer; font-size: 1em; transition: background 0.3s; }
        .btn-primary { background: linear-gradient(135deg, #667eea, #764ba2); }
        .btn-primary:hover { opacity: 0.9; }
        .btn-danger { background: #e94560; }
        .btn-danger:hover { background: #ff6b6b; }
        #debugConsole {
            flex: 1;
            min-height: 0;
            margin-top: 15px;
            background: #0d0d1a;
            border: 1px solid #333;
            border-radius: 8px;
            padding: 10px;
            font-family: 'Consolas', 'Courier New', monospace;
            font-size: 11px;
            color: #00ff88;
            overflow-y: auto;
            white-space: pre-wrap;
        }
        .version { font-size: 0.7em; color: #666; }
        .status-bar {
            padding: 10px;
            background: rgba(0,0,0,0.3);
            border-top: 1px solid rgba(255,255,255,0.1);
            font-size: 0.85em;
            flex-shrink: 0;
        }
        .status-bar .status-item {
            display: flex;
            justify-content: space-between;
            margin: 4px 0;
            color: #aaa;
        }
        .status-bar .status-value {
            color: #00d9ff;
            font-weight: bold;
        }
        .status-bar.gps-locked .status-value {
            color: #00ff88;
        }
        @media (max-width: 600px) {
            #sidebar { width: 260px; }
        }
    </style>
</head>
<body>
    <div id="app">
        <div id="sidebar">
            <h1>🎧 Map Player <span class="version">v6.41</span></h1>
            <p class="subtitle">Walk and listen</p>

            <!-- User Info (read-only - login via index.html) -->
            <div id="userPanel" style="margin: 10px 0; display: none;">
                <div style="display: flex; justify-content: space-between; align-items: center; margin: 10px 0;">
                    <span id="userEmail" style="color: #00ff88; font-size: 0.9em;"></span>
                    <button id="logoutBtn" class="btn btn-danger" style="padding: 6px 12px; font-size: 0.85em;">🚪 Logout</button>
                </div>
            </div>

            <!-- Player UI: Start button only -->
            <button id="backBtn" class="btn" style="background: rgba(255,255,255,0.1);">← Back to Soundscapes</button>
            <button id="startBtn" class="btn btn-primary">▶️ Start</button>

            <!-- Debug console -->
            <div id="debugConsole">Ready - tap Start to begin...</div>

            <!-- Status bar -->
            <div class="status-bar" id="statusBar">
                <div class="status-item">
                    <span>📍 GPS:</span>
                    <span class="status-value" id="gpsStatus">--</span>
                </div>
                <div class="status-item">
                    <span>🧭 Heading:</span>
                    <span class="status-value" id="headingStatus">--</span>
                </div>
                <div class="status-item">
                    <span>🔊 Sounds:</span>
                    <span class="status-value" id="soundsStatus">0</span>
                </div>
            </div>
        </div>
        <div id="map"></div>
    </div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script>
        // Use relative URL - Cloudflare will handle HTTPS
        window.API_BASE_URL = '/api';
    </script>
    <script src="api-client.js?v=20260316130550"></script>
    <script src="soundscape.js?v=20260316130550"></script>
    <script src="spatial_audio.js?v=20260316130550"></script>
    <script src="spatial_audio_app.js?v=20260316130550"></script>
    <script src="wake_lock_helper.js?v=20260316130550"></script>
    <script src="map_shared.js?v=20260316130550"></script>
    <script src="map_player.js?v=20260316130550"></script>
</body>
</html>
