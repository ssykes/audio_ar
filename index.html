<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="theme-color" content="#1a1a2e">
    <title>Spatial Audio AR - Landing</title>
    <link rel="manifest" href="manifest.json">
    <link rel="icon" type="image/svg+xml" href="icon-192.svg">
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
            color: #fff;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        .container {
            max-width: 500px;
            width: 100%;
            text-align: center;
        }
        h1 {
            font-size: 2.5em;
            margin-bottom: 10px;
            background: linear-gradient(135deg, #667eea, #764ba2);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }
        .subtitle {
            color: #888;
            font-size: 1.1em;
            margin-bottom: 40px;
        }
        .card {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 16px;
            padding: 30px;
            margin-bottom: 20px;
            backdrop-filter: blur(10px);
        }
        .card h2 {
            font-size: 1.5em;
            margin-bottom: 20px;
            color: #00d9ff;
        }
        .input-group {
            margin-bottom: 15px;
        }
        input[type="email"],
        input[type="password"] {
            width: 100%;
            padding: 14px 18px;
            background: rgba(0, 0, 0, 0.3);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 8px;
            color: #fff;
            font-size: 1em;
            transition: border-color 0.3s;
        }
        input[type="email"]:focus,
        input[type="password"]:focus {
            outline: none;
            border-color: #667eea;
        }
        .btn {
            width: 100%;
            padding: 14px;
            border: none;
            border-radius: 8px;
            font-size: 1em;
            cursor: pointer;
            transition: all 0.3s;
            font-weight: 600;
        }
        .btn-primary {
            background: linear-gradient(135deg, #667eea, #764ba2);
            color: #fff;
        }
        .btn-primary:hover {
            opacity: 0.9;
            transform: translateY(-1px);
        }
        .btn-success {
            background: linear-gradient(135deg, #00b894, #00cec9);
            color: #fff;
        }
        .btn-success:hover {
            opacity: 0.9;
            transform: translateY(-1px);
        }
        .btn-device {
            background: rgba(255, 255, 255, 0.1);
            color: #fff;
            border: 2px solid rgba(255, 255, 255, 0.2);
            margin-bottom: 15px;
            text-align: left;
            padding: 18px;
            display: flex;
            align-items: center;
            gap: 15px;
        }
        .btn-device:hover {
            background: rgba(255, 255, 255, 0.15);
            border-color: #667eea;
            transform: translateY(-2px);
        }
        .btn-device .icon {
            font-size: 2em;
        }
        .btn-device .label {
            flex: 1;
        }
        .btn-device .label strong {
            display: block;
            margin-bottom: 4px;
        }
        .btn-device .label small {
            color: #888;
            font-size: 0.85em;
            font-weight: normal;
        }
        .divider {
            display: flex;
            align-items: center;
            margin: 25px 0;
            color: #666;
        }
        .divider::before,
        .divider::after {
            content: '';
            flex: 1;
            height: 1px;
            background: rgba(255, 255, 255, 0.1);
        }
        .divider span {
            padding: 0 15px;
            font-size: 0.9em;
        }
        .error-msg {
            background: rgba(233, 69, 96, 0.2);
            border: 1px solid #e94560;
            color: #ff6b6b;
            padding: 12px;
            border-radius: 8px;
            margin-bottom: 15px;
            font-size: 0.9em;
        }
        .success-msg {
            background: rgba(0, 184, 148, 0.2);
            border: 1px solid #00b894;
            color: #00ff88;
            padding: 12px;
            border-radius: 8px;
            margin-bottom: 15px;
            font-size: 0.9em;
        }
        .hidden {
            display: none !important;
        }
        .version {
            position: fixed;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            color: #444;
            font-size: 0.8em;
        }
        @media (max-width: 600px) {
            h1 {
                font-size: 2em;
            }
            .card {
                padding: 20px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🎧 Spatial Audio AR</h1>
        <p class="subtitle">Create and experience location-based audio</p>

        <!-- Login Card -->
        <div id="loginCard" class="card">
            <h2>🔐 Welcome Back</h2>
            <div id="errorMsg" class="error-msg hidden"></div>
            <div id="successMsg" class="success-msg hidden"></div>
            
            <div class="input-group">
                <input type="email" id="email" placeholder="Email" autocomplete="email" />
            </div>
            <div class="input-group">
                <input type="password" id="password" placeholder="Password" autocomplete="current-password" />
            </div>
            
            <button id="loginBtn" class="btn btn-primary">🔑 Login</button>
            <div class="divider"><span>OR</span></div>
            <button id="registerBtn" class="btn btn-success">📝 Create Account</button>
        </div>

        <!-- Device Selector Card -->
        <div id="deviceCard" class="card hidden">
            <h2>📱 Choose Your Device</h2>
            <div id="welcomeMsg" class="success-msg hidden"></div>
            
            <button id="editorBtn" class="btn btn-device">
                <span class="icon">🖥️</span>
                <span class="label">
                    <strong>Editor (PC)</strong>
                    <small>Create and edit soundscapes on your computer</small>
                </span>
            </button>
            
            <button id="playerBtn" class="btn btn-device">
                <span class="icon">🎧</span>
                <span class="label">
                    <strong>Player (Phone)</strong>
                    <small>Walk and listen with GPS-based audio</small>
                </span>
            </button>
            
            <div class="divider"><span>OR</span></div>
            
            <button id="logoutBtn" class="btn" style="background: rgba(233, 69, 96, 0.3); color: #ff6b6b;">
                🚪 Logout
            </button>
        </div>
    </div>

    <div class="version">v6.8</div>

    <script>
        // Use relative URL - Cloudflare will handle HTTPS
        window.API_BASE_URL = '/api';
    </script>
    <script src="api-client.js"></script>
    <script src="map_shared.js"></script>
    <script>
        /**
         * Landing Page Controller
         * Handles login/registration and device selection
         */
        class LandingPage {
            constructor() {
                this.api = new ApiClient();
                this.elements = {
                    loginCard: document.getElementById('loginCard'),
                    deviceCard: document.getElementById('deviceCard'),
                    email: document.getElementById('email'),
                    password: document.getElementById('password'),
                    errorMsg: document.getElementById('errorMsg'),
                    successMsg: document.getElementById('successMsg'),
                    welcomeMsg: document.getElementById('welcomeMsg')
                };
                this.deviceCheckResult = null;  // Cache device check result
            }

            async init() {
                // Check if already logged in
                if (this.api.isLoggedIn()) {
                    try {
                        const valid = await this.api.verifyToken();
                        if (valid) {
                            await this.handleDeviceRouting();
                            return;
                        }
                    } catch (error) {
                        // Check if rate limited
                        if (error.message.includes('Too many requests')) {
                            this.showError('⚠️ Too many login attempts. Please wait 15 minutes and try again.');
                            return;
                        }
                        // Server offline - show login form anyway
                        console.log('[Landing] Server offline, showing login form');
                    }
                }
                this.showLoginForm();
            }

            /**
             * Handle device detection and routing after login
             */
            async handleDeviceRouting() {
                console.log('[Landing] handleDeviceRouting called');
                console.log('[Landing] isLoggedIn:', this.api.isLoggedIn());
                console.log('[Landing] user:', this.api.user);

                const deviceCategory = this._detectDeviceCategory();
                console.log(`[Landing] Device category: ${deviceCategory}`);

                // === PHONE ===
                // Go directly to soundscape picker
                if (deviceCategory === 'mobile') {
                    console.log('[Landing] Mobile → soundscape_picker.html');
                    window.location.href = 'soundscape_picker.html';
                    return;
                }

                // === DESKTOP ===
                // Go directly to map_editor
                if (deviceCategory === 'desktop') {
                    console.log('[Landing] Desktop → map_editor.html');
                    window.location.href = 'map_editor.html';
                    return;
                }

                // === TABLET ===
                // Check GPS and compass
                console.log('[Landing] Tablet - checking GPS and compass...');
                this.showDeviceSelector();  // Show selector while checking

                try {
                    const result = await this._checkDeviceGPSAndCompass();
                    console.log('[Landing] Device check result:', result);

                    if (result.both) {
                        // Tablet with GPS and compass - keep selector visible for user to choose
                        console.log('[Landing] GPS and compass available - waiting for user choice');
                    } else {
                        // Tablet without GPS/compass - auto-redirect to editor
                        console.log('[Landing] No GPS/compass - redirecting to map_editor.html');
                        window.location.href = 'map_editor.html';
                    }
                } catch (err) {
                    console.error('[Landing] Device check error:', err);
                    window.location.href = 'map_editor.html';
                }
            }

            showLoginForm() {
                this.elements.loginCard.classList.remove('hidden');
                this.elements.deviceCard.classList.add('hidden');
            }

            showDeviceSelector() {
                this.elements.loginCard.classList.add('hidden');
                this.elements.deviceCard.classList.remove('hidden');
                
                if (this.api.user?.email) {
                    this.elements.welcomeMsg.textContent = `👋 Welcome, ${this.api.user.email}`;
                    this.elements.welcomeMsg.classList.remove('hidden');
                }
            }

            showError(message) {
                this.elements.errorMsg.textContent = message;
                this.elements.errorMsg.classList.remove('hidden');
                setTimeout(() => {
                    this.elements.errorMsg.classList.add('hidden');
                }, 5000);
            }

            showSuccess(message) {
                this.elements.successMsg.textContent = message;
                this.elements.successMsg.classList.remove('hidden');
                setTimeout(() => {
                    this.elements.successMsg.classList.add('hidden');
                }, 3000);
            }

            async handleLogin() {
                const email = this.elements.email.value.trim();
                const password = this.elements.password.value;

                if (!email || !password) {
                    this.showError('Please enter both email and password');
                    return;
                }

                try {
                    await this.api.login(email, password);
                    this.showSuccess('Login successful!');
                    // Auto-route based on device (don't show device selector)
                    setTimeout(() => this.handleDeviceRouting(), 500);
                } catch (error) {
                    this.showError(error.message || 'Login failed');
                }
            }

            async handleRegister() {
                const email = this.elements.email.value.trim();
                const password = this.elements.password.value;

                if (!email || !password) {
                    this.showError('Please enter both email and password');
                    return;
                }

                if (password.length < 6) {
                    this.showError('Password must be at least 6 characters');
                    return;
                }

                try {
                    await this.api.register(email, password);
                    this.showSuccess('Account created!');
                    setTimeout(() => this.showDeviceSelector(), 500);
                } catch (error) {
                    this.showError(error.message || 'Registration failed');
                }
            }

            handleLogout() {
                this.api.logout();
                this.elements.email.value = '';
                this.elements.password.value = '';
                this.showLoginForm();
            }

            /**
             * Handle button click from device selector (tablet with GPS/compass only)
             * @param {string} deviceType - 'editor' or 'player'
             */
            selectDevice(deviceType) {
                console.log(`[Landing] User selected: ${deviceType}`);

                if (deviceType === 'player') {
                    console.log('[Landing] Player → soundscape_picker.html');
                    window.location.href = 'soundscape_picker.html';
                } else {
                    console.log('[Landing] Editor → map_editor.html');
                    window.location.href = 'map_editor.html';
                }
            }

            /**
             * Detect device category
             * @returns {string} 'mobile' | 'tablet' | 'desktop'
             * @private
             */
            _detectDeviceCategory() {
                const ua = navigator.userAgent;
                const hasTouch = 'ontouchstart' in window || navigator.maxTouchPoints > 0;
                const width = window.innerWidth;

                console.log(`[Device Detect] UA: ${ua.substring(0, 80)}...`);
                console.log(`[Device Detect] hasTouch: ${hasTouch}, maxTouchPoints: ${navigator.maxTouchPoints}`);
                console.log(`[Device Detect] width: ${width}px`);

                // Mobile devices (phone) - check for phone-specific patterns
                const isPhone = /iPhone|iPod|Android.*Mobile|IEMobile|Opera Mini/i.test(ua);
                if (isPhone) {
                    console.log('[Device Detect] → mobile (phone detected)');
                    return 'mobile';
                }

                // Tablet devices - iPad or Android without Mobile
                const isTablet = /iPad|Android(?!.*Mobile)|Tablet|Silk/i.test(ua);
                if (isTablet) {
                    console.log('[Device Detect] → tablet (tablet detected)');
                    return 'tablet';
                }

                // Desktop (default)
                console.log('[Device Detect] → desktop (default)');
                return 'desktop';
            }

            /**
             * Check if device has both GPS and compass (for tablets)
             * @returns {Promise<{gps: boolean, compass: boolean, both: boolean}>}
             * @private
             */
            async _checkDeviceGPSAndCompass() {
                return new Promise((resolve) => {
                    const result = { gps: false, compass: false, both: false };

                    // Check GPS
                    if (!navigator.geolocation) {
                        console.log('[Device Check] Geolocation not supported');
                        resolve(result);
                        return;
                    }

                    const gpsTimeout = setTimeout(() => {
                        console.log('[Device Check] GPS timeout');
                        resolve(result);
                    }, 5000);

                    navigator.geolocation.getCurrentPosition(
                        (pos) => {
                            clearTimeout(gpsTimeout);
                            const hasHeading = typeof pos.coords.heading === 'number' && !isNaN(pos.coords.heading);
                            const hasGoodAccuracy = pos.coords.accuracy < 50;
                            result.gps = hasHeading || hasGoodAccuracy;
                            console.log(`[Device Check] GPS: ${result.gps ? '✅' : '⚠️'} (heading: ${hasHeading}, accuracy: ${pos.coords.accuracy}m)`);

                            // Check compass (DeviceOrientation)
                            this._checkDeviceCompass().then((hasCompass) => {
                                result.compass = hasCompass;
                                result.both = result.gps && result.compass;
                                console.log(`[Device Check] Compass: ${result.compass ? '✅' : '⚠️'}`);
                                console.log(`[Device Check] Result: GPS=${result.gps}, Compass=${result.compass}, Both=${result.both ? '✅ YES' : '❌ NO'}`);
                                resolve(result);
                            });
                        },
                        (err) => {
                            clearTimeout(gpsTimeout);
                            console.log('[Device Check] GPS error:', err.message);
                            resolve(result);
                        },
                        { timeout: 5000, enableHighAccuracy: true }
                    );
                });
            }

            /**
             * Check if compass (DeviceOrientation) is available
             * @returns {Promise<boolean>} True if compass available
             * @private
             */
            async _checkDeviceCompass() {
                return new Promise((resolve) => {
                    // Check if DeviceOrientation is supported
                    if (!window.DeviceOrientationEvent) {
                        resolve(false);
                        return;
                    }

                    // Try to get a device orientation reading
                    const compassTimeout = setTimeout(() => {
                        console.log('[Device Check] Compass timeout');
                        resolve(false);
                    }, 3000);

                    const handler = (event) => {
                        clearTimeout(compassTimeout);
                        window.removeEventListener('deviceorientation', handler);

                        // Check for heading data (alpha or webkitCompassHeading)
                        const hasAlpha = typeof event.alpha === 'number' && !isNaN(event.alpha);
                        const hasWebkitHeading = typeof event.webkitCompassHeading === 'number' && !isNaN(event.webkitCompassHeading);

                        const hasCompass = hasAlpha || hasWebkitHeading;
                        console.log(`[Device Check] Compass data: alpha=${event.alpha}, webkitHeading=${event.webkitCompassHeading}, result=${hasCompass ? '✅' : '⚠️'}`);
                        resolve(hasCompass);
                    };

                    window.addEventListener('deviceorientation', handler);
                });
            }

            /**
             * Show device check status message
             * @param {string} message - Message to show
             * @param {string} type - 'info' | 'success' | 'warning'
             * @private
             */
            _showDeviceCheckStatus(message, type = 'info') {
                let statusEl = document.getElementById('deviceCheckStatus');
                if (!statusEl) {
                    // Create status element if it doesn't exist
                    statusEl = document.createElement('div');
                    statusEl.id = 'deviceCheckStatus';
                    statusEl.style.cssText = 'margin-top: 15px; padding: 12px; border-radius: 8px; font-size: 0.9em; text-align: center;';
                    const welcomeMsg = document.getElementById('welcomeMsg');
                    if (welcomeMsg) {
                        welcomeMsg.parentNode.insertBefore(statusEl, welcomeMsg.nextSibling);
                    } else {
                        document.querySelector('#deviceCard .card').appendChild(statusEl);
                    }
                }

                const colors = {
                    info: { bg: 'rgba(0, 217, 255, 0.2)', border: '#00d9ff', text: '#00d9ff' },
                    success: { bg: 'rgba(0, 184, 148, 0.2)', border: '#00b894', text: '#00ff88' },
                    warning: { bg: 'rgba(255, 193, 7, 0.2)', border: '#ffc107', text: '#ffca2c' }
                };
                const color = colors[type] || colors.info;

                statusEl.style.background = color.bg;
                statusEl.style.border = `1px solid ${color.border}`;
                statusEl.style.color = color.text;
                statusEl.textContent = message;
                statusEl.classList.remove('hidden');
            }

            setupEventListeners() {
                // Login/Register
                document.getElementById('loginBtn')?.addEventListener('click', () => this.handleLogin());
                document.getElementById('registerBtn')?.addEventListener('click', () => this.handleRegister());
                
                // Allow Enter key for login
                this.elements.password?.addEventListener('keypress', (e) => {
                    if (e.key === 'Enter') this.handleLogin();
                });

                // Device selection
                document.getElementById('editorBtn')?.addEventListener('click', () => this.selectDevice('editor'));
                document.getElementById('playerBtn')?.addEventListener('click', () => this.selectDevice('player'));
                
                // Logout
                document.getElementById('logoutBtn')?.addEventListener('click', () => this.handleLogout());
            }
        }

        // Initialize app
        const app = new LandingPage();
        
        // Wait for DOM to be ready before initializing
        if (document.readyState === 'loading') {
            document.addEventListener('DOMContentLoaded', () => {
                app.init();
                app.setupEventListeners();
            });
        } else {
            app.init();
            app.setupEventListeners();
        }
    </script>
</body>
</html>
