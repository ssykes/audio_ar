<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="theme-color" content="#1a1a2e">
    <title>Audio AR - Offline</title>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
            color: #fff;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0;
            padding: 20px;
        }
        .container {
            text-align: center;
            max-width: 400px;
        }
        h1 { font-size: 3em; margin: 0; }
        p { color: #888; margin: 20px 0; }
        .icon { font-size: 4em; margin: 20px 0; }
        button {
            padding: 15px 30px;
            font-size: 16px;
            background: #667eea;
            color: #fff;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            margin: 10px;
        }
        button:hover { opacity: 0.9; }
    </style>
</head>
<body>
    <div class="container">
        <div class="icon">📡</div>
        <h1>You're Offline</h1>
        <p>The Audio AR app is cached and ready to use without an internet connection.</p>
        <button onclick="window.location.href='/audio_ar_app.html'">Open App</button>
        <button onclick="window.location.href='/index.html'">Test Page</button>
    </div>
</body>
</html>
